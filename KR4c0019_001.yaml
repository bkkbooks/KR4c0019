body:
  text: 杜詩攟卷一明唐元竑撰望嶽詩岱宗夫如何想像語也心巳馳絶頂矣青未了謂望止一面故以起結呼應解者失之歸鴈詩望盡似猶見更鍊之則曰決眥入歸鳥亦猶獨鳥怪人看更鍊之則曰鳥窺新捲簾彼此相較即知火候矣所謂剝一層深一層也與李白同尋范隱居詩向來吟橘頌誰欲討蓴羮謂行比伯夷不必情同張翰也與老去悲秋頸聮皆翻案用事皆不甚佳然改惟字即與結句重復少味矣李鄴侯云安能不貴復不去空作昂藏一丈夫贈李白絶句未就丹砂愧葛洪不去也末二句不貴也二李皆謫仙此詩畫出青蓮影子對雨書懷詩震雷翻幕燕翻者驚飛也已上人茅齊詩天棘蔓青絲恆語耳乃有改為夢字者江蓮搖白羽亦不必謂羽為扇蓮瓣何至似扇耶且已公非齊巳齊巳晚唐人去杜甚遠歐注誤也畫鷹詩素練風霜起形容語也題畫常意耳謂是未畫時絹色復成何語臨邑弟苦雨詩題云黃河泛溢堤防之患簿領所憂而結乃云吾衰同泛梗利涉想蟠桃倚賴天涯釣猶能掣巨鼇自以大水為快謔語高談殊覺不知痛癢故云用寬其意當知急者自急非此語所能寬也因思古今負絶技人多不諳世務右軍帖足下今年正七十耶想復勤加頤養而復云吾年垂耳順正恐前路欲逼此豈應對七十老人言也公又時以殺身勸人而孟襄陽對𤣥宗誦不才明主棄此皆自率胸臆初不知有轉㗋觸諱哀哉不能言非謂此等乎乃知癡黠各半不止虎頭豈獨造物與齒去角亦坐精神不能兩用耳更尋嘉樹傳不忘角弓詩傳即左傳正用彼事欲其追念疇昔兄弟之交朂以不忘也注未是李杜千古齊名然杜亟稱李而李落落不答或謂杜期李太過反為所誚荆公獨謂不然清新庾開府俊逸鮑參軍但比之庾鮑又李侯有佳句往往似隂鏗鏗詩又在庾鮑下此論非也昔之庾鮑猶今之李杜蓋人人尸而祝之者杜謂李才兼二子同時同業之人推重至此故啓口即云白也詩無敵荆公忘之耶蓋李眼空一世雖與杜善仍自落落不妨是李高處至杜深愛其詩思之不置我用我法亦正是杜高處未可以俗見議之也胡元瑞云子美不獨虛心太白即高岑輩無所不傾倒然二子推轂杜者亦無幾信然史稱杜善李白高適而集中寄高諸詩意皆不能無望獨于李無之故知當時杜實自謂攀李不及也且李聲彩之盛當代更無與儔如其宗人陽氷所謂古今文集遏而不行惟公文章橫被六合蓋實録也而唐人選唐詩今所流傳于世者諸家品隲無論當否杜大都無處厠足蓋當時極重科目杜終于不第三百年詩人之冠自是宋人推戴語親見楊子雲祿位容貌時誰肯遽為之下哉青蓮曠世逸才當時號為謫仙公詩方期拾瑶草又還丹日月遲又未就丹砂愧葛洪皆以出世期之然青蓮志在匡時自方東山謝安石公前後贈言但許以千秋名無片言及此也至永王事極為昭雪乃又引楚筵辭醴為言則後人謂公詩因孔巢父問訊李白不無微意非穿鑿也其嚴又如此至讀醉眠秋共被攜手日同行之句兩人交情千古如見公惓惓于李不必言李除飯顆謔語外止有魯郡東石門及沙丘城下二篇然何時石門路重有金樽開及思君如汶水浩蕩向南征情至可想矣何必纍牘始稱知已哉嚴子陵有云買菜乎求益也宋員外舊莊詩吟詩許更過針芥相投語也謂尊慕前輩信然謂非自負則不可夜宴左氏莊詩檢書燒燭短吾嘗夜坐讀書苦燭易竟輒念此語爾時方宴何至是耶詩書琴劒雜見篇中備此四事可謂雅集矣竟未識左氏何人也詩罷聞吳詠扁舟意不忘公曾客吳相去未久意者所指如今之棹歌耶奉寄河南韋尹詩有客傳河尹須溪笑之吾以為河尹猶關尹也彼既可稱此何足笑況唐詩中稱河尹者豈止公一人哉獨此詩首云逢人問孔融中云濁酒尋陶令丹砂訪葛洪謬慙知薊子真怯笑揚雄末復云尸鄉餘土室難說祝雞翁引古人以自比何其層見叠出也此則不可為法五七言為途窄矣用字不得不減如浣花溪曰花溪錦官城曰錦城皆文而妥馬卿方朔用慣不覺劉牢葛亮傖矣九十九泉曰十九泉自非誤記何至于此贈韋左丞詩甲子混泥塗正用絳縣老人事下語極有斤兩老驥思千里蒼鷹待一呼所謂矜餘力也結句君能微感激亦足慰榛蕪此感激字有異詩中自矜正欲以言感之且激之不識韋能略一動念否探詞也至紈袴不餓死一篇高自標置抑又甚矣然終于難撼東入海西去秦所謂何天不可飛也當時士子干謁公卿慣用此法謂之捭闔公雖自負本色故自不同其後贈别賀蘭銛云老驥倦驤首蒼鷹愁易馴高賢世未識固合嬰饑貧即此意也其起句云黃雀飽野粟羣飛動荆榛今吾抱何恨寂寞向時人動即撼意所謂感激也注謂韋曾薦公不知何據甚愧丈人厚四句感其贊已而已正惟贊而不薦故以此言激之如果曾薦公公尋常受人酒食尚深致愧謝何以詩中一字不及耶捭闔雖士子惡習然終是盛世事蓋必海宇右文公卿下士時始有之其初始于一二豪傑急于自見稍露鋒鍔適遇當道虛懷愛才傾蓋納交遂成佳話于是不安貧賤者羣起效之遂相沿有傲妄之目然傲則非妄妄則非傲傲者有而不能藏如瘦人多骨妄者無而詐為有如病人浮腫相去天淵世人槩言傲妄所謂涇渭不分故使僞者售而真者絀也如公有激之言雖稍不遜要非妄也乃其後妄人竟為當道所厭惡故杜佑之客至召與食而面數之甚者如陳少遊殺之矣致使韋布膽寒更變為稱功頌德脅肩諂笑以覬餘瀝而一劒霜寒十四州欲改為四十始許相見摛詞家復何所容其足乎此可以觀世變也讀書破萬卷此破字頗難解猶諺云破財財雖未罄巳經消耗曰破萬卷未必首尾皆誦通已無不寓目者此雖誇語却甚斟酌白鷗沒浩蕩宋敏求定作波字極是東坡說非也毋論鷗不解沒但沒浩蕩無此句法或謂贈汝陽王詩結句淮王門有客終不愧孫登亦即贈韋意否曰非也汝陽殷殷願交于公讀招要恩屢至一語可見篇中極口譽之豈紈袴不餓死比哉淮王客用八公事愧孫登翻用叔夜語意謂雖不能效八公以王仙去要能超然自引與碌碌奔走者異若汲黯之重大將軍侯嬴之重公子正是酬知意但與庸人不同耳贈張四學士詩黃麻似六經尊昭代也武衛將軍挽詩舞劒過人絶鳴弓射獸能銛鋒行愜順猛噬失蹻騰第三句頂舞劒第四句頂射獸公詩多有此法夢弼注未是赤羽千夫膳赤羽字可實可虛只當軍中字用耳注引赤羽若日白羽若月語不錯指鴈為炙可給千夫否且箭可言羽何言赤羽況才言射獸又復射鳥成何章法或疑赤羽豈可代軍中字曰東走窮歸鶴南征盡跕鳶遼東交趾字不妨如此代用可例觀也登慈恩寺塔詩方知象教力足可追冥搜公蓋以佛法為詩用亦猶荆公坐禪成胡笳十八拍文人通病不覺自招自非曠士懷登兹翻百憂俗人真語亦安知象教力也唐詩多有此如過櫓妨僧定使過櫓可妨豈得言定耶鸊鵜水鳥也吾郡水鄉最多此物土音直云鼻涕然考鵜字本具平仄二音公詩健筆凌鸚鵡銛鋒瑩鸊鵜平韻也鐫錯碧罌鸊鵜膏仄韻也隨宜用之如廉頗枚乘翠華乘輿等字亦然贈鮮于京兆詩計疏疑翰墨時過憶松筠雖自憐語然古今求名人誰免此者計疏始疑當得意時決不自疑時過方憶正塵勞中決不能憶也語特真至所以為妙貧交行只四句濃至悲慨巳極詩正不貴多白絲行繅絲須長不須白慨末世貴飾賤真也此詩字字用意巳悲素質隨時染裂下鳴機色相射謂致飾則喪真美人細意尉帖平裁縫滅盡針線跡工于飾者彌縫巧妙使人不覺也春天衣著為君舞四句狀其輕薄得時之態香汗清塵汚顔色開新念舊置何許一朝敗露又有輕薄者起而代之舊者棄不用也君不見才士汲引難恐懼棄捐忍羇旅非謂無人汲引才士謂才士任真恥為飾自知枘鑿不受人憐蓋預恐飾者難久為人所棄故寧忍羇旅耳他日又曰畏人嫌我真正是此詩注腳贈哥舒詩軒墀曾寵鶴畋獵舊非熊與鮮于仲通詩脫略蟠溪釣語皆妙有斟酌貧士贈達官不肯一字茍下如此非一味貢諛者勳業青冥上交親氣槩中勳業與交親何與只氣槩二字慿藉門牆揚揚得意之態迄今在目也與朝退若無慿正好對看賢不肖相去何啻千里投贈詩及此者防身一長劒將欲倚崆峒方擬依託以自見故耳非因高達夫在當不作此想送高三十五詩崆峒小麥熟且願休王師請公問主將安用窮邊為公一生持論若此宋儒極推重之不獨以詩也脫身簿尉中始與捶楚辭謂唐時參軍簿尉受杖者是鮑引昌黎詩駁之非也詩意瞭然不煩他證此與飢鷹側翅跨馬觸熱下語皆帶輕薄從古豪傑皆取功名於涕唾之間此亦何足諱且恥而公固深不滿之亦繇其性固然漢世祖所謂狂奴故態也常恨結歡淺各在天一涯試與青蓮醉眠攜手及憐君如弟兄等語相較則高李交情厚薄原自不侔高五十始學為詩其人濶達負氣骨留心世務蓋青蓮一流人然作略實非嚴武比公納交徒以詩故前後寄贈但稱其詩未嘗于貴顯後有一字浮譽即此亦今人所萬不能及也贈崔于二學士詩倚風遺鶂路隨水到龍門諺所謂順風順水也陵厲不飛翻陵厲字較奮迅更有氣儒術仍難起以不飛翻故家聲庶巳存以陵厲故倚風遺鶂路隨水到龍門竟與蛟螭雜寧無燕雀喧參差頂針法也又能畫毛延壽投壺郭舍人每䝉天一笑復似物皆春又疏樹寒雲色茵陳春藕香脆添生菜美陰益食單涼又神女峰娟妙昭君宅有無曲留明怨惜夢盡失歡娛又御鞍金騕裊宫硯玉蟾蜍拜舞銀鈎落恩波錦帕舒又羅襪紅蕖艷金羈白雪毛舞階衝壽酒走索背秋毫又峽束滄江起巖排古樹圓拂雲霾楚氣潮海蹴吳天又君不見道傍廢棄池君不見前者摧折桐百年死樹中琴瑟一斛舊水藏蛟龍皆同此法至灧澦堆詩沈牛答雲雨如馬戒舟航天意存傾覆神功接混茫西閣期嚴明府詩匣琴虛夜夜手板自朝朝金吼霜鍾徹花催蠟炬銷在近體中二聯尤為僅見又寄張山人彪詩草書何太古詩興不無神曹植休前輩張芝更後身數篇吟可老一字買堪貧六句參差頂針亦為僅見何將軍山林詩刺船思郢客解水乞吳兒二語意異謂未善操舟偏能泅水也乞吳兒極誇其能猶言賈餘勇或謂就吳兒乞解水法毋論二句合掌就本句論亦不成語矣贈鄭廣文醉時歌精妙不必言事後追考之頗似一篇挽詩與其生平歷履句句貼合公無前知術何繇得此昔人畫龍㸃睛輒飛去畫女子刺心即痛伎藝到絶處豈有神靈慿其筆端耶詩有䜟若此毋怪今人動多忌諱見貧病老死字毛豎色變棄去不肯竟讀也然鄭之餓死命也不因公此詩其千古猶有生色則實以此詩故殆難為俗人言麗人行青鳥飛去銜紅巾似用漢武事謂傳命女侍耳重過何氏詩問訊橋東竹將軍有報書倒衣還命駕高枕乃吾廬喜出望外筆底躍然便知問訊而不報者蓋有之矣貧士落莫得此不易言外可想此何將軍亦甚微瑣竟因數詩不朽千載尋常一席酒勝沙場血戰詩人有權顧安得人人詩悉如少陵者前詩酒醒思臥簟客不肯去矣後詩高枕乃吾廬殆有甚焉又祗應與朋好風雨亦來過又自今幽興熟來往亦無期又到此應常宿相留可判年何不憚煩也東道主人家才足稻粱耳恐未免攢眉文始象形字者孳也從文而出孳生不巳摛詞家亦然但能創業垂統不患無傳千載而下自有嫡𦙍如渼陂行一篇用意從漢武秋風歌來只歡樂極兮哀情多一語演出如許奇思變態裊窕蒼茫真有鬼神在其腕下所謂脫胎也渼陂西南臺詩懷新目似擊接要心已領仿像識鮫人空䝉辨漁艇亦是頂針句懷新二語所攝蓋廣鮫人荒唐故曰懷新漁艇約略故曰接要各舉一為證也句法大都自靈運來知歸俗可忽亦謝句而稍變之蓋內重則外自輕知歸二字良復不易可字妙茍非其人俗未易忽也世復輕驊騮吾甘雜蛙黽許是知歸之言寄高三十五詩美名人不及佳句法如何言其詩可貴也又云主將奴才子崆峒足凱歌則所謂新詩日又多者無非寄人籬下頌德稱功句法雖佳亦不足貴也巳故首用歎息字深憫之也公寄高如此晚年在鄭公幕下忽忽不樂遄歸故林高允云恐負翟黑子賢者胸襟略同也贈陳二補闕結句自到青冥裏休看白髮生陳時巳老矣休看字妙謂老當益壯也公之自言則曰復有樓臺銜暮景不勞鍾鼓報新晴蓋賜緋後詩也漢世祖云郎官上應列宿今遂為詞家通用若引以為榮者殊不知盜賊狗馬亦皆上應列宿豈止郎官而已沈東美除膳部郎詩云詩律羣公問儒門舊史長清秋便寓直列宿頓輝光觀其下語獨自斟酌蓋人能增列宿之光列宿不能增人之光也歎庭前甘菊詩庭前之菊即野外所移庭前得地矣以移故開遲野外先開以不得地但堪采擷耳二者難兼此歎意也沙苑行結句雖未成龍亦有神馬亦如是魚亦如是故曰異物同情氣苑中偶有巨魚便扯以配馬亦是漫筆偶及謂馬與龍交錯解精氣二字矣鄧公驄馬行雲物晦冥方降精始是馬與龍交此詩不爾也邵氏聞見録云子美以鄭季對文章春苜蓿對霍嫖姚或以為病惟知詩者能辨之此論未當初盛諸公句法對偶多不甚工不獨公一人即公詩亦不獨此二語雖不礙高格然一經拈出實是語病所惡于對偶太切者謂戀句字傷氣格耳如使氣格不傷對偶固應工整即如春苜蓿霍嫖姚縱云不礙于格豈謂格必如是始高耶他日云晚節漸于詩律細則生平不細處公固病之矣後人乃有學為此等者不黽勉氣格而徒矜拙朴亦復何難詩至少陵可謂聖矣其自稱曰學詩猶孺子何謙甚也此猶投贈達官之語其贈僧亦曰小子思疏濶豈能達詞門至許十一何人斯而夜聽誦詩篇中云離索晚相逢包䝉欣有擊又云應手看捶鈎清心聽鳴鏑蓋儼然師道事之求其指教真所謂能問不能處處得師豈止王楊盧駱巳哉後人于此道稍辨菽麥輒巳高蹈遐矚蔑視儕輩矣況肯容人攻其短乎所以終不能超邁也與鄠縣源少府詩無計回船下空愁避酒難謂舟未泊岸欲逃不得也公本好劇飲故以此頌主人之情非真以為苦如尋崔戢李封云崔侯初筵色巳畏空樽愁未知天下士至性有此不語極感激至陪李金吾花下飲云香醪懶再沽結云醉歸應犯夜可怕李金吾乃是不滿語也其自言曰預恐樽中盡更起為君謀官定後戲贈詩不作河西尉淒涼為折腰老夫怕趨走率府且逍遙公時擢尉不拜改授右衛率府參軍參軍冷曹而優于體一羣縣尉驢騾驟幾個參軍鵝鴨行當時語也怕趨走且逍遙以此柴桑自挽後人尚有擬者自贈題極新最堪口實竟未見有繼起何耶崔少府高齊詩相對十丈蛟欻翻盤渦坼與震雷翻幕燕皆偶然目擊語使本無是事寓言及之毋論意涉揑怪即其語亦有何致但幕燕純是景語十丈蛟則感時託興意有屬耳何得空裏雷殷殷尋地脈須溪解佳烟氛藹􅍶崒魍魎森慘戚崑崙崆峒顛回首如不隔意特深妙他日間道奔行在巳先吐露矣作者肝鬲瞭然不須射覆三川觀水漲詩恐泥竄蛟龍須溪笑之以今經生讀泥字皆作上聲故吾謂論語小道道路也猶言僻徑致遠恐泥正借泥濘字何故讀作上聲集中屢用恐泥意唐時原作平聲讀耶若解憂詩呀坑瞥眼過飛櫓本無蒂得失瞬息間致遠宜恐泥又作去聲讀矣登危聚麋鹿漱壑松柏秃及枯查卷拔樹礧磈共充塞皆是畫筆至聲吹鬼神下勢閲人代速則倣佛傳神畫工不當閣筆耶人寰難容身石壁滑側足城市山林無適而可故曰艱險路更局彭衙行于危窘中得一飯之惠故自感不能忘曲江詩吾人甘作心似灰語稍率而未練遂令注者不能了了前云比屋豪華固難數後云杜曲幸有桑麻田故將移住南山邊因弟姪之悲作慰語耳雄豪放蕩詩則似之作者意不爾一百五日夜對月詩全首與今夜鄜州月同意鄜州詩巳極哀怨此詩更帶牢騷斫却月中桂清光應更多恨語也極一時無可奈何之意與青蓮剗却君山好平添湘水流相去千里彼語出自曠襟若不辨來源幾欲例看矣須溪注尤誤所謂語貴不犯者必以月中桂比君側奸邪耳毋論比擬不當更將千古奇幻語扯入腐鄉失豈細耶大都此詩全首似騷語都不倫仳離放紅蘂似言别當秋時夢弼注紅蘂不錯桂自可稱紅蘂鄜州詩題但稱月夜此但云對月觸景懷人取自喻耳政不必人人盡解然亦豈遂不可解誤夫婦作君臣句意舛錯讀始難通獨不思起曰無家結曰牛女與君臣何涉耶送孔巢父謝病歸游江東兼呈李白詩蔡侯靜者意有餘中夜置酒臨前除蔡侯為誰何不見題中送從弟亞詩南風作秋聲殺氣薄炎熾盛夏鷹隼擊時危異人至夏行秋令鳥亦先時也不因一時殺運便憂叔季謂方當盛夏耳下語想見忠愛亞以布衣奮舌廷對所言大都兵法故也其敘君臣皆泣一段足補本傳之缺亞實才士公亦具眼時止為判官便以夾輔期之後竟致位通顯備極驕奢公未嘗纎毫得其益何取同宗兄弟為送韋十六評事詩挺身艱險際張目視寇讐能張目決不至汚賊黨公有所試矣鳥驚出死樹龍怒拔老湫古來無人境今代橫戈矛戈矛所及龍鳥不得安居黎庶不言可知北征詩灑掃數不缺謂內員備官也數字音朔安得此拙句瘦馬行當時歷塊誤一蹶委棄非汝能周防昭雪至此始是憐才然實咏馬耳決不為房琯而發何以知之公詠畫馬尚多極口揄揚生平擬琯以聖賢豪傑語豈寥寥若是且琯雖罪廢時論惜之多望其復起當時行巳召用使非病死未可料也況公屬望尤切者耶絆之欲動轉攲側此豈有意仍騰驤果為琯作肯出此語否早朝大明宫詩旌旗日暖龍蛇動即右丞日色才臨仙掌動意也宣政殿退朝詩雲近蓬萊常五色即右丞香烟欲傍衮龍浮意也句法工力悉敵可謂爭勝毫釐然二詩俱不及右丞旌旗日暖一聫古今稱其壯麗須溪云若非微字清灑不免癡肥論似精細實亦未然旌旗句麗而帶巧巧正癡之反也宫殿句清灑者當因用燕雀字亦不因微字細味自知此題王岑二詩精金美玉不相上下岑之工鍊更勝于王但王氣象獨擅終不肯亞之至公詩得與抗衡者獨旌旗一聯餘固不敵也宣政殿詩亦非至極紫宸殿退朝一首故為傑出起語既自豁眼動人頷聯遂兼王岑之長頸聯天顔有喜近臣知尤諸公所不能道題省中壁起句掖垣竹埤梧十尋竹埤猶言竹屏送賈閣老云西掖梧桐樹空留一院陰即此梧也又按埤與卑字通用古文中多有之荀子埤汚庸俗後漢書清河埤下公胸中有學或偶用古字耳如注言世豈有十尋之竹耶春宿左省及送張司馬南海勒碑詩皆五言近體中之精妙者岑寄公詩聯步趨丹陛分曹限紫微公答云君隨丞相後我住日華東殆似敝縕袍與狐狢立也中允聲名久一詩語雖質却自沈痛不可及曲江二詩俱妙對偶甚工雖意極傾倒未嘗小縱繩墨惟首篇結句語直致少味耳次篇朝回日日典春衣每日江頭盡醉歸每日字吾定為每向傳刻誤也童子學為聲句便知避此公豈草草若是送程録事詩意鍾老柏青義動修蛇蟄謂感程鍾情高義使病昏之人聰明復返若老柏更青蟄蛇仍動也今人不肯以蟄蛇自比遂覺此語暗耳未審所推酒饌幾何遂䝉千載鮑叔之譽貧士可憐然結句云念君惜羽翮既飽更思戢莫作翻雲鶻聞呼向禽急此豈飲食之人所辦送李校書詩鷹子赤毛驥兒龍脊比李父子羡之至矣衆中每一見使我潜動魄自恐二男兒辛勤養無益昔人所謂父子情深不覺至此故此詩末語極無聊賴神宗末年有一監司新到任太守具手本謁之正廷參次忽頓足罵曰狗子太守愕然出倩人叩其故監司曰吾見太守年甚少視其手本止二十幾歲吾兒正與同歲而愚騃碌碌故罵之耳非罵太守也當時傳以為笑人情不甚相遠至小閣詩泛舟慙小婦飄泊損紅顔是見小婦之貌忽自愧其老醜亦可資一噱也此校書乃李舟舟與妹書論天堂地獄洵是千古名言讀篇中羡君齒髮新行巳能夕惕是既擅才名又能恭謹可謂賢者而竟遭讒妒廢痼以死豈非命耶篇尾長雲濕褒斜漢水饒巨石亦似詩䜟也題鄭十八著作丈詩若除去第五橋東及方朔歲星等八句作近體甚妙出金光門詩移官豈至尊雖甚得體然當時實無讒邪毁傷之也疏救房琯肅宗大怒下三司推問宰相張鎬救之得免奈何作此語耶今遂為後世遷謫通用套語矣望嶽詩及早秋苦熱詩皆全首縱蕩如駿馬振脫羈勒奔逸難制時公初到華州失意時所作也微帶牢騷故筆底乃爾寄高三十五詩安穩高詹事兵戈久索居句法從圻父豫王之爪牙來呼而問之也安穩字最得情諺有之曰坐時不覺立時飢遣興三首情至之語宛轉頓挫與羌村詩音節倣佛遣興五首惟長陵鋭頭兒一首佳豈無柴門歸欲出畏虎狼又月明遊子靜畏虎不得語又淹泊仍愁虎又啼畏猛虎聞又不寐防巴虎又於菟侵客恨又人少豺虎多集中畏虎語可謂多矣然又云少人慎勿投多虎信所過人有易子食獸猶畏虞羅又云避喧甘猛虎噫非大不得巳何語激至是貽阮隱居詩貧知靜者性自益毛髮古語極可味至日遣興詩結句愁對寒雲雪滿山恆語耳改雪為白將毋惡劣戲贈秦少府詩昨夜邀歡樂更無謂無如此夕樂耳語意了了注謂不如去年謬甚不見李生詩云世人皆欲殺吾意獨憐才青蓮意氣豪上不可一世世人欲殺宜也至鄭䖍酒後常稱老畫師亦可謂與人無爭者而公詩云夫子嵇阮流更被時俗惡乃知妒賢嫉能古今恆態不必白眼視人始一步不可行也公深嘗此味故自言曰青眼只途窮傷矣鄭之䝉譴得從摩詰例麗於輕典摩詰賴弟縉上章願削官贖罪鄭無所恃惟是身陷賊中密章達靈武與摩詰凝碧池詩皆為帝所原諒故而野史載鄭及摩詰為崔圓畫壁圓庇之得免死凝碧池不必論縉既上章必當奉㫖不畫壁獨不得免乎此皆誣謗之言也不獨此耳陸宣公李北海竝當代偉人而太平廣記極詆之猶可諉之曰野史至以長源文饒二李之功而傳謂長源詭道求容無足可稱文饒攫金都下不見市人真可恨也且謂長源動為朝士戲侮戲侮不謂無之抑知下士大笑青蓮之蒼蠅聲耳至文饒為宰相責其不能忘是非於度外可謂文理不通而朱崖之貶詞臣各擬撰一制詞並刻文集中此胡為者耶制詞可以僞撰何況其餘妒賢嫉能雖古今恆態然漢之小人猶畏清議至于鬱極始有黨錮之禍若乃市井庸下之流十百為群公然厚誣君子無復忌憚者唐始有之以迄於今嗚呼書可盡信乎詩無妙訣但貴真耳愁即真愁喜即真喜流自至性無所因仍則不待冥搜自然警䇿如新安吏詩眼枯卻見骨天地終無情新婚别詩勿為新婚念努力事戎行婦人在軍中兵氣恐不揚垂老别詩老妻卧路啼歲暮衣裳單孰知是死别且復傷其寒無家别詩久行見空巷日瘦氣慘凄又家鄉既蕩盡遠近理亦齊等語真覺腸為生斷鬼亦夜哭然皆得自目擊有類紀事初非愛其悲切特撰為此等句也舍弟江南死家兄塞北亡對則工矣亦有何致有文無情勢必至此無病而呻詞家所最忌也蓬鬢稀疏久無勞比素絲巳自傷矣又有句曰髮少何勞白生涯能幾何常在羇旅中已自傷矣又有句曰生涯抵弧矢此所謂愈練愈工青出于藍也反畏消息來寸心亦何有真腸斷語又有句曰書到汝為人家鄉既蕩盡遠近理亦齊真腸斷語又有句曰無家病不辭五字固極工妙可泣鬼神十字仍自精神不為減色也學杜句者向此等鴛鴦譜中細尋其針腳亦可以三隅反矣五篇中新婚别一篇首尾粹然公詩體格變化不一此數詩中危苦入情處頗類沈千運但千運孤潔削薄公汪洋自恣家數不同耳立秋後詩節短而意調俱暢罷官亦由人洵是名言然後世無敢掛齒頰者昔遊詩王喬下天壇微月映皓鶴當爾時覺形神俱往三百篇婉兮孌兮季女斯飢千古腸斷語也後來堪與嫓美者文則莊子曰鼠壤有餘蔬而棄妹詩則少陵曰天寒翠袖薄日暮倚修竹相提而論覺少陵尤極淒黯何以故薈蔚鼠壤竝是惡物猶希覺悟新人美如玉知終無可奈何故也昔人以詩喻禪唯然有之禪家有言切忌道著詩非訓詁最嫌直說即如天寒二語尋其文句翠袖修竹以當絶代姿竝是仙人手中扇耳著眼仙人當在何處麗人行肌理細膩骨肉勻可謂親切乃此語殊不為佳明此者始可與言詩家三昧也或曰婉兮孌兮季女斯飢非直說乎曰季女託也何謂直說曰然則新安吏諸詩非直說乎曰然敘事貴真毋論新安諸詩即如天寒翠袖薄何嘗不真言情貴婉新安諸詩語雖直敘原其微㫖蓋欲居上位者聞之耳然此意隱隱句字外試取數篇讀之無一語顯然及此所謂切忌道著也若乃安得務農息戰鬬普天無吏橫索錢便與肌理細膩無異不為人所稱矣懷台州鄭十八詩山鬼獨一腳蝮蛇長如樹又云從來禦魑魅多為才名誤名山福地仙釋所都比于鬼域不亦寃乎然興公賦已有此語當時貶竄諸人皆擇險惡地意實如此如柳州山水何嘗不佳絶耶大約人烟湊集處少有靈秀此亦造物與齒去角意耳遣興五首每首各詠一人德公元亮知章浩然後四首了了獨初首嵇康不得死孔明有知音竝舉二人何也曰此須分賓主謂嵇亦卧龍惜其未遇遇則為孔明不遇則身亦不保故曰用舍在所尋蓋單咏叔夜也豈無救時䇿終竟畏羅罟深得龎公本意有子賢與愚何其置懷抱山谷解妙注杜詩最苦穿鑿附㑹然詩中自有有為而發者如獨立詩草露亦多濕蛛絲仍未收下明言天機近人事蓋詩之比也又如天用莫如龍二篇若非有為而發則咏龍何至言性命茍不存英雄徒自彊詠馬亦何至言不雜蹄齧間逍遙有能事也但不可彊為之說耳羌村詩夜闌更秉燭更字平聲亦可仄聲亦可義不甚相遠秦州雜詩秋聽殷地發殷盛也的是平聲須溪注云云蓋為江閣對雨詩所誤耳恨解鄴城圍須溪解是喧呼閲使星閲字超甚于熱閙中忽開冷眼須溪注語吾所未解也薊門誰自北時幽州為史思明所據公蓋用自南自北語耳誰者怪訝之詞謂收復者誰及誰從北還並非也老樹空庭得得字妙然非寫影之謂如江動月移石乃是寫影耳野望詩字字如畫獨鶴歸何晚昏鴉巳滿林但鴉鶴對舉意巳自濃何必更有所比山寺詩麝香眠石竹明言麝香而云小鳥又云鹿何也鹿名麝香未之前聞謂小鳥者當以眠石竹故不知本謂竹下非竹上也歸燕詩不獨避霜雪其如儔侣稀蒹葭詩摧折不自守秋風吹若何二起語如哀絃急張發響清厲春色豈相訪一句妙訝其來暮也促織詩後四句佳苦竹詩藂卑春鳥疑五字妙甚搗衣詩前四句亦如哀絃急張又一氣呵成佳甚第五句搗衣二字在中晚人必有以易之矣此則吾從後進襄陽詩天寒夢澤深公詩天遠暮江遲人謂夢澤句以不可解而妙天寒水落始知其深合上句看何不可解獨一遲字但覺留滯之感隱之言外若欲訓詁實難下筆也夢李白二詩精妙殆勝招魂招魂語雖麗而情逺不及也一句一轉一字一淚所謂隱心結文不自知沈綿惻愴至此故人入我夢明我長相憶是因彼來而明我意三夜頻夢君情親見君意則因我夢而見彼意也魂來楓林青魂返關塞黑與落月滿屋梁猶疑照顔色竝恍如覿面但落月語加𤣥妙故令解者作縹眇之思耳告歸常局促苦道來不易江湖多風波舟楫恐失墜略似鬼語生人不爾所謂恐非平生魂也水深波浪濶毋使蛟龍得因失墜語而發也冠蓋滿京華斯人獨憔悴晉人云使君輩存令此人死天末懷李白詩格意句字具有無窮之妙公詩為李作者無一不佳此篇與秋來相顧一絶夢李白二首尤為警拔然悉考諸作題曰贈李白者凡二最後寄李白者一而巳餘皆曰懷曰憶曰夢曰不見公自馳想李未必知亦如次元道州詩不必示元此公厚處亦公高處而李之不一一具答亦可無訝矣秦州見敕目詩侏儒應共飽漁父忌偏醒蓋敕目除官必不止薛畢公獨才二子故有斯語隴俗輕鸚鵡鸚鵡自喻廟堂之上文士如薛畢者不乏故我偶見遺原情類鶺鴒原情字生謂在原之情也比二子于異姓兄弟意望手援耳凡詩中二人共一題者如贈崔于二學士留别賈嚴二閣老喜薛璩畢曜遷官寄陶王二少尹寄范員外吳侍御送李武二判官寄沈八劉叟皆同事同地不必言至如寄高岑三十韻高時在彭州岑時在虢州寄賈嚴五十韻賈時在嶽州嚴時在巴州人各一天亦不妨便共一題正此可見交情使七子知此亦省幾許篇什寄高岑詩似爾官仍貴前賢命可傷公竟謂後之視今猶今視昔身與二子竝盧王一流人若謂詩人多窮則似爾仍貴傷前賢實自傷也篇中極稱二子何嘗有不足意公不足高時時有之此詩則否豈可因其一時概疑其生平語言耶老去才難盡此語單指高高五十始學為詩文章事業俱在暮年故也男兒行處是古今自負無出此語客子鬬身强古今自憐亦無出此語心微傍魚鳥肉瘦怯豺狼上句佳無錢居帝里千古同慨寄李十二詩兼全寵辱身五字中包括無盡使具言之直欲纍牘又哭王彭州詩云寵辱事三朝亦然敘事如此何煩瑣瑣道屈善無鄰猶云青眼只途窮然道屈字更有餘恨蘇武先還漢黃公豈事秦楚筵辭醴日梁獄上書辰已用當時法誰將此義陳此乃公明目張膽為李昭雪也永王宗室非盜賊比李為所得低回其間謂可依以建功名耳及察其所為則辭官不受賞此雖不及穆生之高比于鄒陽在梁抗直不撓略相髣佛非可與甘從叛逆者同年語也讀誰將此義陳句使公時在朝必當抗章申救矣寄賈嚴二閣老詩蒼茫城七十流落劒三千夢弼注劒閣三千餘里是也洙注引莊子劒士三千人非是但劒南劒北劒外字單用皆可劒三千不可侍臣諳入仗廄馬解登仙公詩有云無復雲臺仗喪亂中行宫草創法仗零落駕還雙闕之後禮儀漸備始諳體式耳即馬亦脫鋒鏑而從容內廄無異登仙然凡用事必如此始靈注引證不錯詩意工妙處似未㑹也每覺升元輔深期列大賢謂房琯也弟子貧原憲諸生老伏䖍師資謙未達鄉黨敬何先豈公與賈嚴俱以師禮事房相與同門序齒耶賈筆嚴君八句戒甚慎言避讒安排求傲吏深警浦鷗預防霜鶻也小人害君子有兩法獨攻則曰傲盡去則曰黨賈不知以何事貶疑亦坐琯黨時詔書雖止列劉秩嚴武名然餘黨尚多如贊公方外人亦坐此逺謫但史不勝載耳使賈坐他事貶何得與嚴同一詩寄張山人彪詩謝氏登山屐陶公漉酒巾群凶彌宇宙此物在風塵此物指屐與巾也舊注指彪豈有呼人為此物者中原有驅除隱忍用此物蓋深惡花門比于異類故有此稱耳前後出塞詩公集中最烜赫者人人誦習然皆從舊注乾元時公在秦州思天寶間事而作更無異說亦不言大將為誰獨東坡云詳味末篇蓋祿山反時其將校有脫身歸國而祿山盡殺其妻子者姓名不傳可恨也坡信具眼然亦以為乾元後作蓋坐見幽州騎長驅河洛昏巳有明證故不疑耳不知正此是誵訛處當通前後細參其意前九首云君巳富土境開邊一何多又茍能制侵淩又何時築城還又古人重守邊今人重高勳又虜其名王歸繫頸授轅門後五首云借問大將誰恐是霍嫖姚又六合巳一家四夷且孤軍又拔劒擊大荒日收胡馬羣又獻凱日繼踵兩蕃靜無虞漁陽豪俠地擊鼓吹笙竽又主將位益崇氣驕凌上都又將驕益愁思纍纍諸言咸太平全盛時乘障備邊拓土俘􅀈取功名耳至于大將止憂其驕何曾一字及叛逆與亂離耶然則坐見幽州騎二語何謂曰此乃公先見假逃將口決其必叛坐見云者猶抉眼吳門觀越兵之入耳此詩必作于天寶末年祿山未叛時無疑注非也不然公剛腸疾惡乾元間筆底每及叛逆必以蛇豕虎狼叱之豈有賊騎巳長驅河洛而猶稱為大將鋪敘邊功且極誇其治軍嚴肅者耶況追敘前事詩至十四首而竟無一語及目前亦斷無此體格也不可不辨征戍之詩莫善于東山不過通下情耳前後諸詩著眼正在此盛時可憂驕將必叛皆從此預決潛身僃行列一勝何足論衆人貴茍得欲語羞雷同此功者未必賞賞者未必功從來灰士心啓邊釁莫甚于此諸篇慷慨悲壯曲折盡情古人當遜其出藍何況來者開元帝固是英才自郭元振以社稷功坐練兵不整幾死纛下是後軍政一變幾復貞觀之初矣然實內耽逸樂未嘗以身率之則委任之人寵過而驕亦思效尤從令從好勢所必至且祿山天性鷙悍嚴而寡恩士卒畏之其一時邊功亦非幸致不如是何以能作賊耶朝進東門營一篇蓋實録也但既云氣驕淩上都又曰將驕益愁思則所謂借問大將誰恐是霍嫖姚者必非直以古人為比不宜草草失作者意蓋古來大將驕貴不惜士卒而戰無不勝垂名史冊祗一霍嫖姚猶博者一擲百萬主人云汝辨作袁彥道不此豈可作實語㑹也故詩須通前後看不可與他處稱嫖姚者一例即如陳陶隴西行可憐無定河邊骨猶是春閨夢裡人人皆稱其用意工妙然大都與慿君莫話封侯事一將功成萬骨枯同解不知彼詩對談兵者言重開邊也此詩對廟堂言戒忘戰也意迥不同何以知之陶此題共有四第一篇云漢主東封報太平無人金闕議邊兵縱然奪得林胡塞磧地桑麻種不生末篇云自從貴主和親後一半胡風似漢家意瞭然矣蓋粉飾太平不復留心武備有功不賞無復念沙場之苦故偏舉此不欲聞者以相告所謂愸置諸耳也今人多看選本不讀全集其用意微婉處何緣具知乎除架詩結句寒事今牢落人生亦有初謂本來空無一物耳西枝村尋置草堂地宿贊公土室詩幽尋豈一路遠色有諸嶺晨光稍朦朧更越西南頂念猶未息將别訪也其後寄贊公詩重岡北面起竟日陽光留茅屋買兼土斯焉心所求近聞西枝西有谷杉漆稠亭午頗和暖石田又足收則巳得地矣何以竟不果耶贊公坐善房琯與公同謫又殷殷招公若此高興不啻逺公沽酒公亦惓惓留意與子成二老來往亦風流竟成虛語耳乃知住山良復不易送人從軍詩好武寧論命封侯不計年此非勸勉之詞世俗戲人進取者曰曾算命否不計年猶云太遠在故結云馬寒防失道雪沒錦鞍韉送行詩若此雖近于戇然自是真相為者送遠詩親朋盡一哭鞍馬去孤城古人送遠行未有不哭者不哭則物議沸然顔氏家訓可考也古今人不相及翻以為訝兩當縣吳侍御江上宅詩亦知故鄉樂未敢思夙昔時危多阻未敢還鄉是矣至于思誰能禁之并思亦不敢者恐念昔年之樂徒深現在之悲也此寫侍御留滯苦懷乃并其心曲得之公自云妻孥隔軍壘撥置不擬道又云貧病轉零落故鄉不可思此實窮途中救苦丹常自服餌經驗者故并以勸人耳秦州同谷紀行諸詩妙有剪裁句意俱練色濃響切無浮聲無冗語殊勝夔州以後晦翁論甚當如石龕詩苦云直簳盡無以充提攜而接云奈何漁陽騎颯颯驚蒸黎截然便住他詩或亹亹更數十言此以剪裁勝也亦有類夔州以後如青陽峽超然侔壯觀已謂殷寥廓突兀猶趂人及兹嘆冥寞其聲半喉半舌側耳難聽然是練句太過耳不至刺刺不休作村嫗語也方盡室流離食不充腹一生困苦莫甚此時而刻畫精到若此知其胸次實自曠逺不為境縛矣至窮途慘景人不堪其憂者偏工描畫如無衣思南州又故鄉不可思又生涯抵弧矢又寒峽不可度我實衣裳單又此生免荷殳未敢辭路難又交情無舊深窮老多慘戚又百年不敢料一墜那得取又鳥雀夜各歸中原杳茫茫皆足令人傷心動魄太息流涕蓋危苦既得自實歷又句意俱練故能爾爾古今來窮苦工妙之語亦未有過之者也無衣思南州此思實匪夷也大庇天下寒士俱歡顔庶以此為廣厦乎但恐住後不免夏日嘆生涯抵弧矢抵當也莊子曰遊于羿之彀中公未必用莊語造句之妙乃不減莊鹽井詩不為佳亦能剪裁故不厭耳此生免荷殳未敢辭路難詩可以怨其謂是乎冉冉松上雨非雨也泄雲䝉清晨初日翳復吐非曾山行遇雨者不知此際客心也冥冥子規叫微徑不復取此子規叫不必耳中以冥冥故不取微徑有戒心耳青陽峽結句謂踰隴望嶽突兀壯觀行行漸遠巳謂隱然寥廓中矣俄復相趂眼中及兹始不復望見也注得其半龍門鎮詩胡馬屯成皋防虞此何及可發浩嘆每念去賊七百里偎牆獨自戰雖戲言實為此輩傳神鐵堂峽詩峽形藏堂隍壁色立積鐵此解鐵堂二字也泥功山詩朝行青泥上暮在青泥中泥濘非一時版築勞人功亦然泥功名既奇公之此解當繇目擊夫山路崎嶇闢之可耳以泥故版築既所難喻縱有之不過一時今以此名山則相沿不知幾何歲月至今未巳也且此必低陷之地何以名山詩中有哀猿透却墜之句又似非低處所宜安得身至其地一考之萬丈潭詩結句何事炎天過快意風雨㑹謂境極幽冷夏日過此乃佳也時正臘月杜詩攟卷一
