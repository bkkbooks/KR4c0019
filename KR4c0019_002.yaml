  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0019_WYG_002-1a, image: WYG1070/WYG1070-0023a.png}
body:
  text: 杜詩攟卷二明唐元竑撰發同谷縣詩況我飢愚人焉能尚安宅飢愚紐字自笑自憐停驂龍潭雲即指萬丈潭也臨歧數子不知何人倘所謂山中儒生非耶交情無舊深窮老多慘戚等是情懷經其筆端倍覺懇惻白沙水會二渡詩捨陸登舟種種景色點綴如畫回眺積水外始知衆星乾較始知五嶽外别有他山尊語更荒幻五盤詩地僻無網罟水清反多魚從寫景得來故佳清江下龍門絶壁無尺土長風駕高浪浩浩自太古想見壯觀結句恐懼從此數謂終身所歷諸艱屈指此其一也大約山水不險不奇聽其言乃使人有褰裳之想石匱閣詩信甘孱懦嬰不獨凍餒迫始曰飢愚既曰孱懦自愍至此拂鬱極矣結意乃在匹休陶謝公真寢食斯道者也不爾安得千古鹿頭何亭亭是日慰飢渴連山西南斷俯見千里豁因此語追考前赤谷詩山深苦多風落日童稚飢悄然村墟迥煙火何由追即知此日以前山行俱不免飢渴矣人謂詩史庶指此等乎史自有史筆所謂簡而且詳疏而不漏若纎悉具書如市㕓帳簿且不得言史無論詩矣東征詩云蜎蜎者蠋蒸在桑野敦彼獨宿亦在車下傷人之不異蟲也樂府變其語曰男兒可憐蟲出門懷死憂尸喪狹谷中白骨無人收直呼人為可憐蟲更奇少陵又變其語云鳥雀夜各歸中原杳茫茫茍未免有情讀此那不腸斷同谷七歌昔人謂風騷之極致不在屈原下果然但其語牢落絶似騷然章法未似也以太整故如秋興八首乃似耳長鑱長鑱白木柄我生託子以為命東飛鴐鵝後鶖鶬安得送我置汝傍白狐跳梁黃狐立蝮蛇東來水上遊等語皆備極無聊直欲發狂大叫七歌真足當哭其能遠匹離騷橫絶千古者以此尚有譏其末篇津津富貴識見卑陋者此與銅雀春深鎖二喬謂措大不識好惡社稷存亡生靈塗炭都不問只恐捉了二喬正同苦哉二杜所謂一杓屎潑却也後遊詩江山如有待花柳更無私須貼題想其下語之妙不止泛言氣象狂夫詩欲填溝壑惟疏放疏放二字是公一生本色志在千古者大都不復計一時所謂狂也石笋行不佳而議論甚確今越中禹陵有其一亦此類也詩之比興賦天然有之下筆自來不須有意撰造亦不得截然分别孰興孰比孰賦多有興而比比而興比興而即賦者妙正在此有意撰造即不能佳如鳯凰臺石笋萵苣諸詩是也律詩之法多分情景虛實此雖不可不知要是拘泥之論儘有虛字實用實字虛用者儘有全寫景而情具其中但言情而景可併見者將何分析祗如踈燈自照孤帆宿新月猶懸雙杵鳴非景語乎當爾時更不必言情全是情語矣又如親朋盡一哭鞍馬去孤城非情語乎并其景亦畫出安得不謂景語所謂聲色總不過五五色五聲之變不可勝窮求駿足者當觀于牝牡驪黃之外可耳論詩要當以氣為主氣之豪上無過青蓮而少陵直欲過之觀其喜則手腳欲旋悶則發狂大叫乃至新松惡竹鶯語花開等句雖小景細事並有一種猛鷙之性溢于言外而搜其心曲則青天白日迄于老困沒齒終無改變如此人安得不千古乎青蓮豪而暢少陵豪而鬱凡其筆端奇恣橫溢皆鬱所為也摩詰天資近道其見地超于李杜然評者謂其詩高者似禪下者似僧終遜李杜一籌者以其氣和平不能雄耳王元之在商州賦詩云兩株桃杏映籬斜裝點商州副使家何事春風容不得和絲吹折數枝花其子以杜有恰似春風相欺得夜來吹折數枝花之句請易之元之曰吾詩遂能暗合子美卒不易吾謂元之詩本與公異父子誤解詩意且不必言後之讀者便爾承訛不巳地下有知將毋一笑此詩蓋因牆外人折花而發也謂之恰似即非真風折可知何不看起句手種桃李非無主野老牆低還是家此豈難解者耶即此一詩公之用意深厚直是過人百倍不獨抱茅之童置而不較撲棗之婦憐而更親巳也至詩意婉妙非王所及又無論矣乃千餘年來此意終于埋沒于公不言本願即得將毋謂索解人不得乎特為表出聊當酹公一觴奉慰九原也蒼苔濁酒林中靜碧水春風野外昏是相形語蒼苔濁酒殊不足言在林中乃覺其靜碧水春風本自不惡在野外更覺其昏耳掩門不出為此也意亦在起句內自在正以靜故笋根稚子無人見沙上鳬雛傍毋眠傷稚子無母不及鳬雛偶然慈語耳何至紛紛聚訟京洛雲山外一首深怨之語難其舂容藴藉讀之不覺杜鵑行全用鮑參軍語若非有託蹈襲胡為為明皇作殆是也又一生自獵知無敵亦用庾開府語庾云野鶴能自獵此則不妨出藍梅雨詩湛湛長江去冥冥細雨來佳在去字董遐周欲改去為失豈有此理詩須看全首氣格須看本句對法最不宜強為之説又范至能吳船録云蜀無梅雨子美梅熟時經行偶值雨耳恐後人便指為梅雨故辨之此又不可不知也韋偃畫馬歌寥寥數言氣格不亞長篇韋畫亦是禿筆寫意髣佛相敵韋本名鶠公偶誤耳王宰山水圖歌巴陵洞庭日本東赤岸水與銀河通語本荒忽難解須細讀全篇兼明畫理畫家之法自近而逺近者髣佛巴陵洞庭俄而日本俄而赤岸直接銀河矣然必有雲氣間之故曰中有雲氣隨飛龍此即所謂尤工遠勢古莫比咫尺應須論萬里也十日畫一水剪取吳淞半江水題雖山水並言始終贊水耳宰殆工畫水者丈人山詩自為青城客不唾青城地可謂奇句亦甚興濃後來却數語便住然氣格不減大篇一室詩應同王粲宅留井峴山前謂此室雖暫寓後世遂為故迹亦如前賢矣夢李白詩千秋萬載名寂寞身後事贈鄭虔詩名垂萬古知何用雖贈友亦自道也虛名何益言外令人思張季鷹北鄰詩青錢買野竹白幘岸江皋南鄰詩錦里先生烏角巾園收芋栗未全貧北鄰白幘南鄰烏巾恰是的對未經拈出寄楊五桂州詩梅花萬里外雪片一冬深記稀有也此詩首尾八句只作一句讀與萬古仇池穴羣盜哀王粲等詩同法另是一格不然則起句不必言五嶺皆炎熱宜人獨桂林併梅花二語減色矣祗如過常少府詩野橋齊度馬亦是記稀有也何必更言野橋多狹獨此最濶哉此論詩者所當知暝色赴春愁赴字實妙無人覺來往覺字平平耳難相比也反照入江翻石壁歸雲擁樹失山村翻失字實響圓荷浮小葉細麥落輕花浮落字平平耳難相比也張懷瓘云但知真草一槩略無差殊豈悟右軍書自有五等又失山村或作濕字亦妙但微遜失字耳每讀之輒為惋惜不忍棄去安得一句中並收之琴臺詩酒肆人間世琴臺日暮雲太史公列傳七十司馬長卿傳最長只此十字堪與之敵王直方詩話云老杜眼邊無俗物多病也身輕樂天亦有眼前無俗物身外即僧居之句然不為人所稱吾謂公句在集中本非出色乃因樂天轉覺其佳何也眼邊無俗物自然體為之輕巳全包身外即僧居意五字贅矣公正以俗物病魔相提而較寧此毋彼可見其句意精到無浮詞長語也漫成二首讀書難字過巳有倦意故結云知余懶是真也對酒滿壺頻謂乾而復滿不竭意也與杯乾甕即空正相反然殊不及過字有趣讀結句乃知世間固有偽懶者可資一噱舍南舍北皆春水但見羣鷗日日來花徑不曾緣客掃柴門今始為君開所謂聞人足音跫然而喜也羣雞正亂叫客至雞鬬爭驅雞上屋樹始聞叩柴荆是因雞閙不聞叩聲偶然實景非前詩用意之比每讀三百篇怪古人情濃百倍今人一馳思輒節外生枝往而不反晉人聞歌聲輒喚奈何所謂不勝情也公詩如眼見客愁等絶已自淋漓至江畔獨步尋花諸作直是飛揚橫放一往難遏每讀一過覺健如黃犢老猶故態一時胸懷千古傾倒金石猶有泐時此不磨也昌黎云利欲鬬進有得有喪勃然不釋然後變化猶鬼神此論書也可通于詩矣三百篇大抵聖賢發憤之所為作憤字如訓作恨怒豈能盡括三百篇祗是其氣有餘如草木亦曰怒生氣盛則詞昌此不易之論也江亭詩水流心不競句雖佳稍嫌道學氣不若雲在意俱遲尤妙欣欣物自私亦勝花栁更無私然花栁更無私却無道學氣彼題曰後遊作者觸目會心别有意在非説理也少年行老瓦盆一首意亦佳然與題不合幾于失旨矣吾無取于此戲為六絶專闢偽體也偽體者何為當時學四言詩及楚詞者言也原本風騷自詭復古降及漢魏庶幾近之六朝不足學矣況王楊盧駱乎然盧王輩雖遜漢魏並是異才大手開府雖有小疵老筆更不可及爾曹單薄瑣瑣未易攀後塵也方且自誇能撥去時調無所掇拾不知攀屈宋即屈宋是汝師親風雅即風雅是汝師獨非掇拾前人乎屈宋風雅究自有真汝直偽耳未得國能巳失故步空腹高心多見其不知量也唐人集中擬風騷等作甚衆公獨無之以此意當時必有以此誇公者故發斯論耳過都過字平聲逢唐興劉主簿弟詩劒外官人冷關中驛騎疏官人本熱緣劒外故冷關中驛騎本不疏緣冷故疏也官人字近俗貴與冷字相形不然不暢簡王明府詩驥病思偏秣鷹秋怕苦籠驥即應偏然非因病已甘逐隊鷹秋籠之何益況重以苦得不怕哉字字用意公干謁詩每以鷹驥並言此聯最警然上句絶妙下句逺不及也余亦嘗有句云驥倦終殊駑鷹癡欲化鳩恨不使少陵見之寄高彭州一絶百年巳過半秋至轉飢寒為問彭州牧何時救急難公初到成都高曾寄詩供米高詩僧飯屢過門已明知公艱甚公答詩有故人供祿米之句未幾復有詩云厚祿故人書斷絶雖未必指高然當時厚祿故人指蓋可屈高亦其一矣今此詩呼聲嗷嗷不嫌為馮婦昌黎大儒亦時有此忍飢故自難也然公與高語時時倔強不相下高之落落亦公自取之至今詞壇位次公視高如小弱弟豈以一時屈彼千古斛斯六官詩結云老罷休無賴歸來省醉眠斛斯賣文索錢公預知其不能得故聊戲之酒徒能省醉眠亦復何用錢為公以賣文索錢為無賴後乃有嗔贈輕如湜及持金去如乂者錦城絲管一絶題云贈花卿解者謂花敬定僭用天子禮樂此詩諷也近世胡元瑞駁之謂花卿乃歌者姓名偶同耳或問二説孰是曰元瑞是也節度使僭妄當時誠有之敬定偏禆也胡不思至是然花卿之為敬定舊注巳然亦不始于用修如元瑞真具眼也且如解者言題當云花卿席上聞樂豈得但言贈花卿哉即如成都猛將一篇題云戲作花卿歌蓋傍觀持論亦非投贈與同杯酒接殷勤之歡也敬定雖驕恣然一時定亂功高賞不酬勞死後血食人道我卿絶世無雖止贊其勇意當時蜀人之論必有不同朝廷者公雖心是朝廷篇中極口揄揚亦未嘗沒其功也天子禮樂談何容易假使顯然僭踰至此公固一飯不忘君者尚肯垂涎其酒食從容宴會納交賦詩乎百憂集行通篇無可憂者但妻孥苦飢耳如此人遂不得飯喫傷哉病柏詩神明依正直故老多再拜當時俚俗有此風拜杜鵑以古帝拜病柏當以樹神故也必謂杜鵑託喻明皇此柏何託暫往比鄰去一詩題云范二員外邈吳十侍御郁枉駕此侍御意即兩當縣江上宅主人耶君子也其名不傳喜見于此特為表出之王侍御攜酒草堂詩戲假霜威促山簡須溪議其俗見此泛論可耳未會詩意詩中所指者高達夫也高初刺彭州既而移刺蜀州公在成都天涯故人目擊流落力巳能為之地其後成都尹崔光遠罷以高攝其位謂宜握手道故解衣推食而高寂然無之公所以介介也且汝年幾小之言出自公親筆高幾狎侮故人矣士屈于不知已他人無足責高亦詞壇名匠所以然者良因少時與公及青蓮酒後大言各不相下數人之中惟高晚達公遂窮困便欲跨而上之將謂勢之所在公必委曲見推而公殊不為變方謂挾貴挾長俗氣未除非假霜威促之未必肯來此語政自有意何得反議公俗見哉不寧惟是移時勸山簡頭白恐風寒自注云此句戲之正答其年幾小所謂無言不酬示不為富貴屈也公于一飲一食無不歡然傾倒至達官貴人終不肯作乞憐語然亦未嘗較量口吻間獨于高如此者正以素相友善故也且侍御攜酒題曰請邀高使君而次詩云故人能領客攜酒重相看明以故人屬王而目高為客彼既外我我亦外之能領云者明高自為侍御來非為我來霜威促山簡意不更彰明耶須溪于公詩可謂能細讀者奈何不參觀前後而重謬其旨也寄别馬巴州詩知君未愛春湖色興在驪駒白玉珂公居傍水馬訪公必須乘舟蓋料其不能來也興在驪駒謂正騎馬紅塵中未暇放舟耳江上觀造竹橋詩合歡却笑千年事驅石何時到海東合歡字雖不佳若改合觀彌劣矣引題中觀字為證似迂三絶句會須上畨看成竹上畨猶言分班也以筍多恐人盜去故嚴護之耳畨字亦作仄聲王建宫詞遙聽帳裏君王覺上畨聲鍾始得歸可證也趙注既含糊乃更有因而竟改為上筤者何歟獨酌詩行蟻上枯梨行字定作倒字是答廣州張判官詩宇宙蜀城偏亂離中求清寧之地不易得自慶語也又身在蜀見得如此髣佛男兒行處是語答嚴中丞詩阮籍焉知禮法疏此答鸚鵡鵕鸃句也又嚴詩結句興發會能馳駿馬終須直到使君灘欲公就見之公結句云枉沐旌麾出城府草茅無徑欲教鋤更欲嚴就見巳真可謂不有獻子之家者觀其謝放推問狀云陛下不書狂狷之過復解網羅之患是古深容直臣勸勉來者之意天下幸甚豈小臣獨蒙全軀而已對君如此何有于其餘即莫倚善題鸚鵡賦何須不著鵕鸃冠實亦真相愛之言公既千古高人嚴亦一時雄傑各率胸懷面目具在而矮人觀場輒因此造為欲殺之論此新唐書添入舊唐書所無也但詳考舊史亦非實録何以知之本傳云公見武有時不冠其誕傲如此此蓋因武詩而附會也不知鵕鸃冠朝服也公時必以野服相接于禮法為疏又獨稱鵕鸃者佞幸之服傅脂粉為容悅公性骯髒自負意中所深惡故用此調之何嘗謂公不冠哉新史既以鸚鵡句疑其欲殺舊史亦以鵕鸃句證其不冠總是以意揣摩影響杜撰而巳書可盡信乎且嚴之善公臭味不必言亦緣坐房琯事並謫同病相憐耳新史乃謂嚴將不利于房杜至引青蓮蜀道難為證謂為二人危之今青蓮詩具在宋帝云彼自詠檜耳況此詩作于天寶全盛時攜入長安為賀監所稱賞因此著名事迹顯著如此竟不一考耶考而不明闕文可也造為説以實之不獨厚誣嚴杜并至株蓮房李立言者慎之非有明證奈何逞臆寃人至此極哉次嚴中丞西城晚眺詩地平江動蜀天濶樹浮秦精警軒豁不必言地平天濶即所謂宇宙蜀城偏也稱頌語如此始是氣象贈王司直短歌舊注王為蜀中刺史詩中趿履侯門謂王知我我復舍此何向于鱗選此詩迄今人人誦習細求其説滋不能通起語云吾能拔爾抑塞磊落之奇才豈有方作飛鳥依人而反欲拔主人之抑塞者脫劒佩暗用彈鋏事仲宣身依劉表又司直同姓故借以為喻而青眼望之然則趿履侯門正指王耳必非自謂也王不知何名既稱司直即非刺史可知其後墮馬折臂詩中亦祗稱官有王司直刺史之説吾不知何據王于時當是仰人鼻息者故公憐而欲拔之作此老人語意本瞭然何得支離至今耶但西得諸侯得字終不能解頗疑有誤或是謁字杜詩聚訟多矣非好為異求其合耳唐爾時官品極濫多係虛名其稱使君者往往貧不自振衣食難賙徒步藍縷故當時有街中足使君之句公即其一也王郎司直大都使君類耳後人但見官名便不顧文義強為之説故考訂不厭詳也江上值水如海勢一首祗述懷耳始終不及題意故著浮槎替入舟但非水涸皆可用餘更無涉詩篇渾漫興知是實語屏迹詩村鼓時時急此鼓必非鼓鼙之謂注亂離奔走誤矣果爾何以結云心迹喜雙清耶第二首晚起家何事無營地轉幽家何事即無營第二句但欲出地轉幽三字耳故接云竹光團野色舍影漾江流正寫幽意失學從兒懶長貧任婦愁百年渾得醉一月不梳頭都根晚起來此又一法也送嚴公入朝詩結句公若登台輔臨危莫愛身嚴才具不必言所勉獨此耳非相知至深何緣責難若此嚴别公起句云獨逄堯典日再覩漢官時未敵風霜徑空慙雨露私正答此意便已滿口承當矣豪傑肝腸千古如見戲贈友云一朝被馬踏脣裂板齒無注謂此焦校書即是焦遂果爾飲中八仙歌賀監二語當移以贈之此物二字殊不為雅而公固屢用之如高田失西成此物頗豐熟謂芰荷也此物歲不稔玉食失光輝謂橘也苦遭此物聒孰謂吾廬幽謂衆鳥鳴蟬也中原有驅除隱忍用此物謂花門也臣如忽至理君豈棄此物謂彤庭所分帛也天寒大羽獵此物神俱王謂鷹也群凶彌宇宙此物在風塵謂屐與巾也花門小箭好此物棄沙場謂銅牙弩錦獸張也江上舍前無此物謂綿竹也此物娟娟長遠生謂赤梨葡萄也舊有一二誤解者聊彚而疏之弇州舉詩七字俱平者曰桃花梨花參差開乃遺中巴之東巴東山何也又瀟湘之山衡山高亦是但上多君不見三字耳又五字皆平者集中尤多如無衣思南州憂端齊終南龍吟回其頭皆奇語餘不能悉數青蓮以下諸名家亦時有之但不多耳二句中十字九平者如北征詩乾坤含瘡痍憂虞何時畢寄薛璩詩人生無賢愚飄颻若埃塵送魏少府詩賢豪贊經綸功成空名垂雨詩淒淒生餘寒殷殷兼出雷遣興詩蓬生非無根飄蕩隨高風此法自古有之子建文昌鬱雲興迎風高中天叔夜單雄翻孤逝哀吟傷生離靖節幽蘭生前庭含薰待清風飄飄西來風悠悠東去雲是也殷璠謂曹劉詩蓋有十字俱平者今查曹集有之劉無可考豈為後人所刪耶殷固言挈瓶膚受之流責古人詞句質素不辨五音恥相師範唯取輕艷無復氣骨故知非大家撥去拘忌卓然特立不能自異流俗也乃公竟以詩家千古一人而不獲一第吾誠不得其解將非拘忌為之纍乎殷殷字作上聲讀亦得鐵堂峽詩壁色立積鐵贈許十一詩業白出石壁觀水漲詩石壁滑側足昔遊詩白日亦寂寞望嶽詩渴日絶壁出五字皆入聲是即疊韻也兩句中用東西南北字者公集中亦屢見如遣悶呈嚴公詩西嶺紆村北南江繞舍東送舍弟穎詩岷嶺南蠻北徐關東海西舍弟觀迎新婦詩東望西江永南遊北户開嚴中丞枉駕詩川合東西瞻使節地分南北任流萍寄從孫崇簡詩嵯峨白帝城東西南有龍湫北虎溪句法各各不同公詩中如雞鳴風雨交久旱雨亦好又曰皇天久不雨既雨晴亦佳如摧折不自守秋風吹若何又曰青冥亦自守軟弱強扶持如花栁更無私又曰欣欣物自私如浮雲終日行遊子久不至又曰百川日東流客去亦不息如春夏各有實我飢豈無涯又曰豈知秋禾登貧窶有倉卒此兩意互相發者也如七夕詩牛女年年渡何曾風浪生又曰萬古永相望七夕誰見同杜鵑詩生子百鳥巢百鳥不敢嗔仍為餧其子禮若奉至尊又曰誰言養雛不自哺此語亦足為愚蒙此一意自相反者也公詩于朋友間語極斟酌如傳如記各肖其人故後來多驗如高適杜亞當筮仕時輒以逺到期之高之十年旌麾杜之前席夾輔果如所料張建封方少年公時老矣一見輒極口譽之雲臺天衢張竟克踐尤可異者巢父掉頭贊歎語也而孔竟為賊殺焉知餓死傾倒語也而鄭卒以餒終又新詩句句好應任老夫傳嚴時尚同官未嘗有詩贈公一時偶然語耳至今嚴詩竟附公集中照耀千古不然誰寓目者此皆非意所及殆所謂筆端造化者耶公詩集據王原叔序舊乃六十卷亡逸之餘人自編托合為二十卷詩止十八篇所遺蓋多矣今考集中大約中年以後之作至少作百無一焉豈盡失之歟夔州以後又似全稿俱存更無散失者此則賴子孫能收藏也宗文先公死宗武不久亦死其孫始克葬公而能保有此稿以迄于今即此可謂賢子孫矣葛常之韻語陽秋舉陶元亮敝襟不掩肘藜羮常乏斟公詩天吳與紫鳯顛倒在短褐謂巧于説貧吾謂此猶尋常貧態未為出格陶詩如三旬九遇飯十年著一冠始是出格奇窮公詩如無食思樂土無衣思南州又囊空恐羞澀留得一錢看又嚴霜衣帶斷指直不得結又小兒強解事故索苦李餐又平明跨驢出未知適誰門又春夏各有實我飢豈無涯又豈知秋禾登貧窶有倉卒可謂最工于説貧矣吾嘗言泌之洋洋是飽人語茍蔬鮮自給不羡魴鯉非難事也西山一歌出自餓夫口中哀怨自不堪聞故景貴實歷所謂文生于情耳薑楚公畫角鷹歌梁間燕雀休驚怕亦未摶空上九天題畫常意耳不必自負注蓋為進雕賦表所誤也表云雕者鷙鳥之殊特搏擊而不可當引以為類是大臣正色立朝之義此則公自負也然公曾為拾遺矣竟未嘗搏擊一人搏擊豈得巳事哉若此詩自負者是欲人畏我也心術不端矣果何所見而誣公若此悲秋詩家逺傳書日非親歷不知其味也老逐衆人行千古恨恨合上愁窺高鳥過其意謂不及高鳥猶能矯然自異於衆耳客夜詩秋天不肯明舊稱其工吾謂此從孤眠苦境中自然流出非有意求工也如江平不肯流乃是因字工耳古人送别不以死亡為諱公詩便與先生應永訣等句亦猶行古之道也不獨送别即問疾亦不諱檀弓云不幸而至于大病則如之何君子不以為戇但此亦視交情厚薄事勢緩急何如如公寄漢中王三首已知嗟不起未許醉相留自注云斷酒不飲篇中有戲蓋王時以酒得疾也三首中不能隨皂蓋自醉逐浮萍終思一酩酊淨掃雁池頭尚憐詩警䇿猶憶酒顛狂始終無他惟索飲耳乃預嗟其不起何也使王病果棘度不能起豈宜更從而索飲哉此復何事而可戲者後有玩月呈漢中王詩蓋竟因三詩故蒙見招矣草野倨侮幸為王所容而不覺直謂之不諳事可也首作祗看座右銘祗字或作眠字似勝九日奉寄嚴大夫不眠持漢節何路出巴山時公居梓州值嚴還朝尚在蜀棧道中故起句有經時冒險之語持漢節謂嚴也公詩何路出巴山嚴答云卧向巴山月落時兩鄉千里夢相思公結句云遙知簇鞍馬回首白雲間嚴答結句云跋馬望君非一度冷猿秋雁不勝悲兩人唱酬明明可證董遐周云此老以典屬國自況乃中丞而胸奴之蜀道難所以作也誤甚矣蜀道難之説吾推究其病根必從陸暢詩來暢反青蓮蜀道難作蜀道易以頌韋皋于是無識之徒謂蜀道易既頌韋皋蜀道難必刺嚴武一人悍然筆之于史千人萬人閧然和之即有學如遐周者亦不免承訛悲夫古人受誣若此者可勝道哉玩月詩關山同一照烏鵲自多驚不必有所指自是好句烏鵲畏明故照同而驚獨也意從曹孟德月明星稀四語來或改照為點不通東坡一點明月何妨獨創必謂因此耶相從行嚴二者别駕耳而詩中云紫衣將炙緋衣走則刺史將何如節度使又將何如故公有邊頭公卿仍獨驕之語也相從二字詩中無之公特撰為此題以見投分意耳異哉此老偏與姓嚴人有緣嚴氏溪放歌費心姑息是一役不可解注殊牽強未了了結句同煮茯苓嚴蓋隱士何不表其名字也述古詩鳯凰從天來何意復高飛高飛比隱逸從天來本自高有心斯世故無飛意也驥難于馭故曰誰馭鳯難于食故曰忍飢此謂物理可喻君臣謁文公上方詩久遭詩酒汚是對僧語望牛頭寺結句休作狂歌老回看不住心直欲懴悔結習矣春日惱郝使君詩結句舞處重看花滿面樽前還有錦纒頭語雖近麗其意則與與奴白飯馬青芻等耳郪城西原送别詩遠水非無浪他山自有春謂好惡未能懸斷到自知之一詩送兩人正合如是注太回互曲矣錦官城得名亦如鹽官銅官之類此説良是即集中有可證者送竇九歸成都云問絹錦官城是也兜率寺詩江山有巴蜀謂于江山中乃有巴蜀須溪注妙所謂莊子注郭象也何顒好不忘何顒字誤好不忘謂同其纍耳非好佛之謂白牛車遠近且欲上慈航謂縱未免纍不礙發心也不復知天大空餘見佛尊未知作者意何如頗似諳佛理者見字本不穩解作現在佛謬以對知天妥否風吹滄江樹雨灑石壁來樹字的是去字之誤晦翁創改之可謂少陵功臣至朝廷燒棧北鼓角滿天東初無誤字倘因蜀有漏天之説遂改滿為漏則燒棧字對漏天亦須為之説始得豈可使杜句偏枯至此耶今集中因晦翁語竟改滿為漏又不愁巴道路恐濕漢旌旗須溪謂失字好蓋據歸雲擁樹例耳不知在彼則字工在此則意晦矣今集中亦竟為失字其餘妄改未能悉數昔山谷欲改東坡白頭字為日頭張文潛以告坡曰黃九欲改作日字我亦無奈他何吾欲援此語為公叫屈至如新炊間黃粱改聞黃粱行蟻上枯梨改倒蟻娟娟戲蝶過間幔改開幔把君詩過目改過日因知貧病人須棄能使韋郎迹也疏一小説改上句云不知貧病關何事改盡如是九原有知當亦囅然或問對雨詩不愁巴道路恐失漢旌旗本謂道逺冥濛難望正與歸雲擁樹意同何謂晦也曰彼詩意止寫景又本句中有雲擁字故失字意躍然此詩不憂道路但憂旌旗言外别自含意已作不了語矣又改為失字豈不太晦故意本深者淺求之不得意本淺者深求之亦不得過深則離本意矣須溪聰明人求之太深也章留後南樓詩寇盜狂歌外形骸痛飲中沈深雋永思味不盡只以平語出之詩家最上乘也今人為郭外之飲預恐門閉必先留門臺上詩留門月復光當知唐時巳有此語矣老去一杯足高興掃盡非復老馬為駒之比故曰何須把官燭似惱鬢毛蒼棕拂子詩不堪代白羽有足除蒼蠅有字疑是且字南池詩安知有蒼池萬頃浸坤軸此閬中之南池洵大觀也公又有閬水歌閬中勝事可腸斷閬州城南天下稀豈謂此池耶濟寧南池一勺耳因許主簿一詩遂為勝迹余嘗兩遊之恨未到蜀中也石犀行今年灌口損戶口此事或恐為神羞又先王作法皆正道詭怪何得參人謀南池詩高堂亦明王魂魄猶正直不應空陂上縹眇親酒食此皆未達鬼神之理李氷有大功於蜀血食其地民實賴之先王立法久猶有弊千載之後一損戶口便為神羞耶漢祖帝業起自蜀中居民報德久而不忘謂正直之神不應親酒食則儒門祭祀皆以不正直待其君親又何舛也然此等議論最近宋儒固宜為所極喜王命詩牢落新燒棧蒼茫舊築壇此咏郭汾陽事也本言蒼茫新築壇耳只一舊字史家敘事論斷皆具此之謂雋永遣夏詩受諫無今日此語令人痛淚迸流臨危憶古人言外當有古今不相及之感巴山詩結句狼狽風塵裏羣臣安在哉意指此也冬狩行禽獸巳斃十七八殺聲落日回蒼穹幕前生致九青兕馲駝􅐑峞垂玄熊東西南北百里間髣佛蹴踏寒山空為章彝天閲作也喜君士卒甚整肅為我回轡擒西戎草中狐兔盡何益天子不在咸陽宫此語未足服其心章本志功名故勵精訓練待西戎至而後圖之豈有及耶然則公語非乎曰上帝好生古今明訓殺業報應但爭遲速終有反爾之日如章之訓練將有為也豈知身為嚴武所殺嚴攘夷拓土功成名遂年甫強仕奄然就木此並多殺之報隂陽人道之患非此即彼孟子曰善戰者服上刑仁人之言為萬世法昔人謂公詩似孟子真知言也章留後同遊山寺詩公為顧兵徒咄嗟檀施開末云窮子失淨處高人憂禍胎不可解觀以兹撫士卒語將非章欲借寺屯兵乎然則實非檀施蓋稅居也此緇流茹苦不敢言者公為代鳴亦釋門一金湯矣歲宴風破肉荒林寒可回明其不堪住也與金錯囊垂罄銀壺酒易賖同一句法思量八道苦自哂同嬰孩是真語對留後言又有諷意收京詩衣冠却扈從五字具多少彈文與馮歡結轡再拜數語意殊不同故下云剋復誠如此扶持在數公莫令回首地慟哭起秋風也有感五首大君先息戰歸馬華山陽又不過行儉德盜賊本王臣又終依古封建豈獨聽簫韶又願聞哀痛詔端拱問瘡痍公所謂致君堯舜上再使風俗淳者略具此數語中大約孟夫子強為善意也齊人築薛是謀或非所及故他詩又云小臣魯鈍無所能又願見北地傅介子老儒不用尚書郎也昔人謂覓句如掘得玊盒子底但精思求之必有其蓋此語可味蓋二句直須銖兩悉配稍或輕重不倫便非底蓋矣然亦有得力偏于一句者如白骨新交戰雲臺舊拓邊同為授鉞之臣今昔相提何啻千里如日聞紅粟腐寒待翠華春此陳陳者何難立使萬姓春回而凍餒之民依然猶待異日若非下句之妙上句孰師語耳又如五更鼓角聲悲壯三峽星河影動搖三分割據紆籌䇿萬古雲霄一羽毛皆兩句合看始覺警䇿若單看上句殊不動人如二儀清濁還高下三伏炎蒸定有無非下句貼題上句不免寬套此得力在下句能使上句生色不可謂之偏重輕以其開闔相關故也又如雲近蓬萊常五色意極濃至至于雪無可著想而曰雪殘鳷鵲亦多時覺後人輕寒不入宫中樹蓋有所本又江山如有待題曰後遊有待正貼後字意意亦甚濃至於花栁本謂不能待耳而曰花栁更無私看得更别此得力在上句因而生出下句亦不可謂之偏重輕者以其映帶相稱故也以當玉盒底蓋均為無忝莫取金湯固長令宇宙新不過行儉德盜賊本王臣金湯豈可不固而曰莫取儉德何嫌于過而曰不過意頗難會蓋積粟以固吾圉本吝嗇也託言行儉不知窮民無計轉為盜賊財聚民散豈長䇿哉所謂巽言也領郡輒無色之官皆有詞此語似為今設多難之際自非利器盤根錯節望而却步恆情類然也江亭餞蕭遂州詩老畏歌聲短謂來日苦短也與摩詰鶯啼過落花過字同工暮寒詩沈沈春色靜訝之也頸聯林鶯遂不歌遂字尤妙結句忽思高宴會朱袖拂雲和如是乃與春宜耳嚴武之殺章彝不知何故今不可考觀公稱章訓練強兵至云回天地動鬼神及平段子璋之亂章與有力亦一健士也公自注云時初罷梓州將赴朝廷而詩中有湘西河內語頗似微知其消息者嚴實奇才時方鋭志圖吐蕃必不至于小忿殺刺史殺彝之後威振一方次年即成大功則彝者穰苴之莊賈李淮臨之崔衆也公格外高人決未必參與密謀嚴亦決不輕泄于公殆是先見即此一事誰謂公僅腐儒天入滄浪一釣舟與宇宙蜀城偏異意而同工此等句後人不能蹈襲百年萬里今遂層見疊出矣雙燕詩今秋天地在吾亦離殊方天地字極妙人稱錦江春色來天地而不稱此何也將赴成都寄嚴鄭公五首無限傾倒休怪兒童延俗客初不曉其意既乃得之曰舊雨新雨公所歎也借光主人藥欄水檻間知不寂莫此意中事口吻間不覺自逗故歸後詩云大官喜我來遣騎問所須城郭喜我來賔客隘村墟果如所料也至于鵝鴨松竹皆預為處分亦猶斯干方築室而生男生女其泣喤喤乃至室家君王一時俱在眼中耳他人有此真意諱而不言欲另撰奇語茍無其情安得奇春歸詩别來頻甲子歸到忽春華歸來詩客裏有所適歸來知路難草堂詩昔我去草堂蠻夷塞成都今我歸草堂成都適無虞四松詩避賊今始歸春草滿空堂所謂歸者皆指成都草堂也先是公將捨蜀適吳故其詩云今秋天地在吾亦離殊方雖稱寓公尚非本願及再赴成都寄嚴鄭公詩云故園猶得見殘春則頓異前稱至是乃始視蜀為家意將老焉賈閬仙所以有却望并州之語也絶句六首幽棲身懶動客至欲如何厭客語也贈王侍御詩男大卷書勻謂各有一卷書解亦可吾意稚子未嫺舒卷稍長知矜慎始能勻耳句法如是乃工不然卷書二字為拙矣其用意則從禮記來洗眼看輕薄自是醒語長吟詩江飛競渡日此與家遠傳書日皆一字傳神彼言情此寫景各自詣極草見踏青心微遜上句然結云賦詩新句穩必為此二句發也公蓋自得意者送韋諷上閬州録事參軍詩揮淚臨大江高天意悽惻公衣食不自謀萬方嗷嗷瘡痍反側官務割剝蝥賊未去此何與隱人事而惓惓若此真所謂葵藿傾太陽物性固莫奪者後來詞人動言國事大都借為詩料耳丹青引贈曹霸本讚其畫而曰學書初學衛夫人但恨無過王右軍則知霸亦兼善書也即今漂泊干戈際屢貌尋常行路人悲莫甚此語者瓦缶黃流千古惋惜途窮反遭俗眼白世上未有如公貧但看古來盛名下終日坎壈纒其身既為曹霸傳神亦復自畫影子公便是寫照第一手相馬失之瘦相士失之貧公貧士偏與瘦者聲氣相合其論書曰書貴瘦硬方通神論畫曰幹惟畫肉不畫骨忍使驊騮氣凋喪真名言也至公詩又不偏于瘦然有奇藻陸離骨肉勻稱者有清空如話骨勝肉者而終無肉勝骨者則猶之論書畫意也若其至處直如天馬行空但覺滅沒如龍何暇説肥説瘦青絲詩未如面縛歸金闕萬一皇恩下玉墀此專為僕固懷恩言也懷恩雖反賊實朝廷有以致之其一生功效自難抹殺公既卓然以千古自命下筆直是矜重他賊不肯作此語也十月即為虀粉期猶云即日掃除吐蕃入寇正在十月和嚴鄭公軍城早秋詩殊不及嚴更催飛將追驕虜莫遣沙場匹馬還橫槊賦詩嚴洵異才也史譏其恣行猛政又賞賜無度或因一言賞至百萬此庸人無識妄議豪傑豪傑用人不過賞罰不如是何以破吐蕃七萬衆乎為治之道寬嚴操縱初無定則惟因事因時因地蜀地偏一隅易治易亂治之者稍異中原前此諸葛武侯後此張忠定公皆恩威並用使人畏而愛之故一時風行草偃聲稱至今二公皆學道人又非嚴比如明醫治疾偶用毒藥意在救人智者所見略同也白面生遙聞舉止稍異庸俗膽為破矣故史不可無識又八哀詩云嫉邪常力爭又豈無成都酒憂國只細傾正直忠義尤可想見嚴爾時巳死公豈曲筆耶嚴代高適才一年便成此大功死時才四十觀其用崔寧一事智能之士安得不為之死所謂政簡移風速及雄略動如神知皆實録也又讀意待犬戎滅人藏紅粟盈以兹報主願庶或禆世程之句始知嚴胸中籌畫政不止此使少須臾無死功業殆未可量也房極知嚴嚴極知崔雖皆未盡所長其所自見亦足震動一時然則房亦非腐儒矣至嚴之待房亦有可原嚴本坐房黨貶至布告天下所謂潛為交結輕肆言談有朋黨不公之名違臣子奉上之體首標劉秩次即嚴矣詔書亹亹于崇黨近名比周成俗深致嫉焉至謂房妄自標持恐流俗多疑故縷言之使人知不濫其申飭如此嚴功名之士也豈不知顧忌縱使舊交不替亦當嫌疑自逺何得以形迹議之凡史所譏皆不足為纍正見其略耳願比死者一洗之聊因論詩并附于此立秋日院中云巳費清晨謁那成長者謀院中晚晴云浣花溪裏花饒笑肯信吾兼吏隱名是時嚴方奏公為工部員外賜緋一生流落遲晚得此他人以為榮公顧恥之次年王正三日果歸溪上如云野人曠蕩無靦顔豈可久在王侯間又白頭趨幕府深覺負平生又暫酬知已分還入故林棲蓋骯髒之骨終不為一官小屈也院中晚晴詩葉心朱實堪時落果實儘有未熟先落者此朱實巳熟是其應落時節故曰堪注未是倦夜詩暗飛螢自照水宿鳥相呼賦景直是味長興比反淺遣悶呈嚴公詩平地專攲倒分曹失異同攲倒猶以頭風故專字遂露本色見諸曹無敢不肅獨我然耳分曹失意同更自咄咄不屑為同又不能為異語嫌于太露故在隱顯之間禮甘衰力就甘字可憐即所謂未敢息微躬也既受職在幕下拜謁之儀自應逐隊公固深恥之至比之為網為籠為束縛然嚴實重公故曰寬容存性拙周防二語正從失異同來周防期稍稍叔夜所謂俯情順俗也太簡遂匆匆則所謂性不可化終不能獲無咎無譽也匆匆二字殆不堪具陳須溪謂幕中有不合是矣會希全物色時放倚梧桐此物色字意異他人以拔擢為物色公意直在格外相賞若非見放必拘世套物色不能全也倚梧桐是草堂實景何必用據稿梧事用事自有法豈有改據稿梧為倚梧桐者無香而稱香者如青蓮白門栁花滿店香又瑶臺雪花數千點片片吹落春風香又梨花白雪香又海石榴詩清香隨風發又昌黎櫻桃詩香隨翠籠擎初重及公風吹細細香枇杷樹樹香諸句試為甲乙之栁花稱滿店借酒香故雪花稱吹落春風借花香故最有致枇杷櫻桃梨花石榴想當然耳猶爐存火似紅也若經簡點即是語病未足借為口實竹香句最劣何以故以題中咏竹得香字既無别意明屬趂韻故雖詞家添一佳話亦此君與公各自足重耳殊不關詩句事也凡詩題得某字者此字押須著意如鄭公廳事畫圖得忘字結云從來謝太傅丘壑道難忘摩訶池泛舟得溪字結云莫須驚白鷺為伴宿清溪可謂著意句矣不似風吹細細香也鄭公文武全才自是千古人物故能略杜之褊性而優容之所謂惺惺惜惺惺也北池臨眺詩結句何補參軍乏歡娛到薄躬賔主間可謂浹洽矣至于杯酒霑津吏衣裳與釣翁知其才精密無細不到所以成功之易也孫伯符王鎮惡使未即死肯如是止乎惜哉初冬詩獵火著高林謂延燒也或是形容語張舍人遺褥段詩初讀頗訝其不情人以幣交不受已矣何至以李鼎死歧陽來瑱賜自盡為言及詳其服飾定尊卑語疑此錦鯨類今之飛魚非極品不可服用故曰顧我非公卿留之懼不祥也然今之鶴補贈遺通用初不問官品崇卑意古今不甚相遠公何拘泥至此耶亦可以觀其所守矣又爾時所禁花樣自麟鳯外有仙鶴萬字等而不及鯨魚俟更考之哭鄭廣文詩穀貴殁潛夫鄭蓋餓死也但覺高歌有鬼神焉知餓死填溝壑一時贈言不料成讖忘形到爾汝痛飲真吾師殷鑒不遠內顧戄然矣故曰心息酒為徒也且負薪採梠業巳身嘗此苦談虎色變稅駕可虞存亡不重見喪亂獨前途何暇悲友直自悲耳安知他日竟以飽死乎寄别高常侍詩飛騰無奈故人何意外歎訝語與嚴挺之乃有此兒意正同耳高于公殊落落公亦如之高去而嚴復來高卒於永泰元年正月嚴卒于永泰元年四月皆舊史明載公傳中乃云武卒公無所依乃遊東蜀依適既至而適卒一書中矛盾若此安在其為信史哉公哭高詩歸朝不相見蜀使忽傳亡此豈遊東蜀依之之語哉萬里悲秋常作客百年多病獨登臺萬里傷心嚴譴日百年垂死中興時乾坤萬里眼時序百年心如此百年萬里那得不為人蹈襲然原句自在究竟不能襲也絶句三首始終説船本意乘春進艇不期狂風放顛故即事自慰幸其不為釣船之續也狂歌行贈四兄語語村朴直作家書讀所謂掇皮皆真兄將富貴等浮雲弟竊功名好權勢誰肯自言好權勢者一生喜怒常任真真人前自難説假話他日又云畏人嫌我真云知余懶是真云於我見子真顔色時時拈一真字不獨人貴真詩亦如之文而偽不若朴而真也喜雨詩結句晚來聲不絶應得夜深聞期之也詳詩時尚未晚哭嚴僕射詩老親如宿昔部曲異平生度嚴在時軍令整肅當無敢涕唾者今豈得如昔耶人情類然如翻覆手獨其親不變耳深悲之語豈得言親健如昔長江詩接上遇衣襟定有訛字奉漢中王手札詩夷音迷咫尺鬼物傍黃昏異鄉惡況鮮復過此觀狐狸不足論及從容草奏罷語豈王時將有所彈劾耶宿昔奉清尊公自謂也追昔與宴思續此歡耳與草奏稍不粘注遂解為入朝侍宴侍宴語豈若是小時讀杜詩不能全記偶憶九江日落醒何處一柱觀頭眠幾回私訝云何不言醉何處及復讀首句頗憶荆州醉司馬笑云必為此也近見夢弼注諸將詩昨日玉魚蒙葬地早時金碗出人間是用茂陵玉碗事避玉魚改金耳因喜小時之疑又得一證劉舍人云富于千篇貧于一字詞家時有此諸將詩五首前四並規諷語末首極推嚴僕射安危須仗出羣才蓋於死後追惜之分明謂當世一人真不知冠挂簾鈎之説何據也故房相公歸葬詩起句云近聞房太守須溪謂後人誤改尉字吾謂尉字不誤正誤改守字耳房爾時已加贈太尉故詩中云安石竟崇班豈有不遵功令而猶稱太守者借曰因貶刺史故以為稱正是恨意查房傳中去年四月已以特進刑部尚書見召途中病卒乃在次年八月則其生時官非刺史已歲餘矣且集中贈刺史詩極多尚不見有太守字高適為蜀州刺史以常侍徵題即云寄高常侍皆可例也況題中明稱故房相公祭文亦然何獨詩中忽稱太守為言人所難言乎應仍改尉字為是永夜角聲悲自語中天月色好誰看句法絶異如五言白髮少新洗寒衣寬總長皆集中少見偶一為之耳蓋五言第三字斷七言第五字斷也後人慣用好誰字相襲不巳不知此二字何曾相聯哉五言第三字斷古詩自有此句法十九首出郭門直視曹子建太倉令有罪是也杜詩攟卷二
