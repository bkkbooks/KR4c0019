body:
  text: 杜詩攟卷三明唐元竑撰少陵于花門最不滿意見之吟詠者極多遣憤詩至云雷霆可震威花門雖鷙悍唐社稷再造實賴其力雷霆句毋論不諳事勢亦豈投桃報李義耶注稱爾時回紇與汾陽共破吐蕃入朝齎繒帛十八萬府藏空竭至稅百官俸以給之此以為憤詳詩意不因此莫令鞭血地再濕漢臣衣當是指回紇白晝殺人市中有司執之下獄其長突入獄中奪去傷及官吏事也留花門云中原有驅除隱忍用此物譬如醫用毒藥治疾已效矣不贊其起死回生之功反惓惓以猛悍之性詳告人戒勿輕用者為垂訓後來也鄭典設自施州歸詩氣合無險僻謂賓主相投故逺赴之不畏行路難也城郭洗憂戚非親厯險峻者不知北風吹瘴厲羸老思散䇿謂南州瘴氣鬱蒸於冬月為宜故又云孟冬方首路強飯取崖壁也屢空之迫公與鄭同不覺聞語亦動此興至預恐老人涉險乘馬蹉跌擬用肩輿所謂爾時覺形神俱往注云政似無説何也尤妙在羣書一萬卷博涉供務隙有如此賢主人固應作褰裳想矣他日辱銀鈎森疏見矛戟後寄裴施州詩亦云蛟龍動篋蟠銀鈎裴必工臨池者金鍾大鏞在東序氷壺玉衡懸清秋佳句也然倣之不為難杜詩至處不在此大食寶刀歌吁嗟光祿英雄弭微須溪注吾不解也但大食國名可耳光祿官名也何以名刀耶須有所據乃可此詩才力橫絶只牧出令奔妖腰亂領字稍粗耳角鷹詩氣象亦相倣佛十二月一日三首即看燕子四句須溪注是然此詩筆端恣橫至此極者實頂第二首結句春花不愁不爛漫來也若不如此頂接便非法度詩到縱恣處須法度熟極乃可耳如不離西閣詩前首結句不知西閣意肯別定留人次首起句云西閣從人別正頂上句來也又如側生野岸及江蒲以前首先有荔枝字不然側生是何物又如龍標題灞池二首腰鐮欲何之東園刈秋韭世事不復論悲歌和樵叟開門望長川薄暮見漁者借問白頭翁垂綸幾年也第二首妙有世事不復論意須合看始明又如陳陶隴西行四首若不遍讀定應誤解此類未易悉數吾謂詩難選者以此春日春盤細生菜忽憶兩京梅發時盤出髙門行白玉菜傳纎手送青絲吹笛秋山風月清誰家巧作斷腸聲風飄律吕相和切月傍關山幾處明拈首句二字偶一為之後世至有花月等詩句句花月重重疊疊從何得此法老病詩藥殘他日裹謂向後日益衰頽正費藥餌在偶對藥裹預想他時忽忽無聊落腕不自覺謂昔日即少味矣又與對句去年合掌水閣朝霽詩續兒誦文選訓蒙景象何堪入詩只一續字情事宛然他如未去小童催呼兒問煮魚野食待魚罾細雨更移橙牆頭過濁醪收書動玉琴又驟雨落河魚藤蔓曲藏蛇山精白日藏溪喧獺趂魚冬溫蚊蚋集蜻蜓立釣絲麝香眠石竹及風落收松子天寒割蜜房仰蜂粘落蕊倒蟻上枯梨犬迎曽宿客鴉護落巢兒啅雀爭枝墜飛蟲滿院遊等句又如孤峰石戴驛雨檻卧花藂炎宵惡明燭客散鳥還來等句皆即事觸目筆底忽來初無故實亦不因苦思乃知隨地皆詩料不待他求但能言者鮮耳鍾嶸云古今勝語多非補假皆由直尋唐堯真自聖野老復何知憂危語也一朝自罪巳萬里車書通祝頌語也正好合看客居所居堂夜來歸來衝虎過卜居赤甲遷居新語皆草草然猶似復非復日日每日則復矣故當是誤也客堂詩巴鶯改巴稼似勝臺郎選才俊自顧亦已極前輩聲名人埋沒何所得公始終止以才俊聲名四字自居至於官職僅一省郎便謂已勝古人更不望加何其自知審也杜鵑詩西川有杜鵑四句東坡解極是論詩須通看全篇此詩自首至尾無一語不質朴只似村野人家書耳老筆頽然故作此態亦復何疑且前年滄州殺刺史今年開州殺刺史此絶句也豈亦可云題下小注耶賈太傅治安䇿痛哭流涕長太息但作此言耳非真哭也別蔡著作詩賈生慟哭後寥落無其人安知蔡夫子髙義邁等倫獻書謁皇帝志已清風塵流涕灑丹極萬乘為酸辛則真痛哭流涕矣又贈杜亞詩經綸皆新語足以正神器宗廟尚為灰君臣皆下淚則當時陛見談時事而哭者蓋不止一人且帝皆同哭所以才士竸思自見時雖多難終致廓清有以也東坡乃云安有立談之頃而遽為人痛哭者豈未考此耶寄韋有夏詩歸楫生衣臥注謂生水衣則臥字何解八哀詩纍纍滿紙摘其佳句不可多得如長嘯天地間髙才日陵替真足令人涕泗霑裳次則碣石嵗峥嶸天地日蛙黽開元天寶一二十年間史册只十字略可括其梗槩惜為後人誤解埋沒千載今特為正之至汝陽讓帝子眉宇真天人虬鬚似太宗色映塞外春語非不佳然在後人決不敢道也豈無成都酒憂國只細傾亦可誦司空王公詩胸襟日沈靜肅肅自有適善為名將寫照曉達兵家流曉達字文苑英華作晚學司徒李公詩青蠅紛營營風雨秋一葉臨淮百戰百勝建社稷功徒以嫉邪遭讒咫尺不得見天子其後徘徊畏罪不敢入朝鬱鬱而死使不死殆未知所稅駕也人但知其用兵若神豈知危於纍卵乎此語真能道其意中九原有知當不止死淚映睫已也嚴鄭公詩敘述詳盡蓋公素所悉故然嚴一生功業在破吐蕃收鹽川而詩中無一字及之何也當緣軍旅未學公素不留心故其沈機妙算無得而稱焉亦如史記敘諸將戰功也閲書百紙盡文苑英華作百氏當從之百紙何足道汝陽王詩官免供給費水有在藻鱗殊不可解豈曽請上供魚池為放生所耶聖聰矧多仁一語上二字承上從諌下三字起下也然如此敘事亦是靴裏動指北海詩豐屋珊瑚鈎麒麟織成罽紫騮隨劍几義取無虛歲當時潤筆之盛若此北海文長于碑板一生刻石至八百本分宅脫驂間感激懷未濟衆歸賙給美擺落多藏穢蓋以資財賑施貧乏使富人盡若此何惡于多藏財豈真穢物哉人自穢耳如是人陷以贓罪張相之可恨更甚于李林甫爭名二字可謂得情張貪佞又負文名故也終悲洛陽獄事近小臣斃叫天無辜公為代鳴不平矣獨步四十年風聽九皋唳又衰俗凜生風排蕩秋旻霽鬚眉如生北海不死也易力何深嚌絶不可解定有訛字關鍵歘不閉意亦難會祗如慷慨嗣真作咨嗟玉山桂若非自注亦復誰解者咨嗟玉山桂競亦未能了了也祕書詩制可題未乾乙科已大闡英華作制題墨未乾休聲已大闡語較妥篆刻揚雄流溟漲本末淺青熒芙蓉劍犀兕豈獨剸蘇似工于雕繪刻削而源委時有遺者故反為後輩褻也然則所云前後百卷文枕藉皆禁臠當是類書屬耳觀其不受偽署大節凜然又能批鱗直諫卓然名臣而與鄭著作為伍將毋老子與韓非同傳耶然長安米萬錢凋喪盡餘喘天蓋使與鄭同厄矣不獨公詩也篇首時下萊蕪郭忍飢浮雲巘負米晚為身每食臉必泫夜字照爇薪垢衣生碧蘚庶以勤苦志報兹劬勞願豈蘇幼時貧困其親亦以餒死歟蘇殆至性過人者幸有此詩可考然史傳寂寥竟無表章之者矣且當時官爵極輕既知其不從賊擢考功知制誥矣竟使以冷曹艱食至于餒死果何以勸忠耶鄭詩子雲窺未遍方朔諧太枉謂鄭博辨不窮應諧似朔但不至如朔已甚類優俳耳非稱屈之謂讀此詩鄭蓋無一不能者不止三絶矣未曽寄官曹突兀倚書幌頗遭官長罵有以也張相國詩碣石歲崢嶸狀其獨立羣小之間砥柱不撓意天地日蛙黽喻羣小嘈雜猶云是渠世界也蛙黽兼喧卑二意此何與祿山事果指祿山何所忌諱不叱言之而但加以別號曰碣石耶何不通上下看退食吟大庭何心記榛梗似專指相國感遇詩而言今我遊冥冥弋者何所慕超然逺引不復以羣小置懷抱所以能自全也當時林甫讀此詩知其必退遂不為害是也乃知君子心用才文章境經綸天下之才不得盡用於世便移向此中且惜且幸賓客引調同八韻皆讚文章也須溪以相國大節在預知祿山反便以篇中不及為恨不知今載史册故人人知之當時江湖淪謫之人何緣悉知朝端議論哉移居夔州郭詩春知催栁别止是别當春時但筆幻耳江與放船清與出門流水住同一想路然工拙較殊矣農事聞人説山光見鳥情新遷耳目一時畢具山光悅鳥性便覺遜之上白帝城老去聞悲角人扶報夕陽極善寫衰颯意報字想見師丹老態字法如是乃謂絶工謁先主廟真句句有味然後漢留長䇿四句全是諸葛廟語可刪也嘗論昭烈起于魏勢略定之後如國手敵道棊饒敵數子何緣取勝兩君易地皆然耳每讀力侔分社稷志屈偃經綸覺我胸襟豁然已盡竹送清溪月苔移玉座春與春知催栁别等句法最是詩意尺水興波使人入其玄中功臨耿鄧清清字無謂又出韻決是親字但親字亦不佳當時諸葛成何事只合終身作臥龍此語祗為人嗤猶聞辭後主不復臥南陽未嘗不兼此意但圓渾不露耳淳漓之别正謂此八陳圖東坡解佳知是開眼作夢古柏行妙在句句是詠孔明最能行最能二字稱其技也攲帆側柂入波濤撇旋梢濆無險阻能此而已愁詩公自注強戲為吳體今不知公所指吳體者為何等讀之但覺拗耳宋方萬里瀛奎律髓遂以拗為吳體豈據此詩耶強戲者偶一為之拗體杜集中至多寧獨此也當時北人皆以南音為鄙俚公意似在半雅半俗間耳老去詩篇渾漫興夔州諸詩漫興為多五言古尤傷于率晦翁亦嫌其煩絮試摘佳句如泊舟滄江岸久客慎所觸如芒刺在我眼焉能待髙秋如食新先戰士共少及溪老如鬱陶抱長䇿義仗知者論又文章一小技於道未為尊如閉目踰十旬大江不止渴又髙人煉丹砂未念將朽骨如青山淡無姿白露誰能數如飲酣視八極俗物都茫茫又越女天下白鑒湖五月涼又秋風動哀壑碧蕙捐微芳又榮華敵勛業歲暮有嚴霜如不聞八尺軀常受衆目憐如連山蟠其間溟漲與筆力如干戈少暇日真骨老崖嶂如寒蕪際碣石萬里風雲來如君山可避暑況足採白蘋如秋風亦已起江漢始如湯如茅楝蓋一牀清池有餘花如經過倦俗態在野無所違如丈人但安坐休辨渭與涇如勞生共乾坤何處異風俗十步一芳自不勝採每讀東阿與吳季重書觴酌淩波于前簫笳發聲于後足下鷹揚其體鳯觀虎視左顧右盼謂若無人當斯之時願舉泰山以為肉傾東海以為酒食若填巨壑飲若灌漏巵其樂固難量形容幕賓大嚼之狀直是輕薄然公詩中於酒食往往自極形容不獨豪飲兼亦健噉千載之下宛若目擊所以來後人飽死之誚也然吾讀三百篇國風多言男女雅頌多言酒食舉輒津津尊而王公幽而鬼神誰能捨之者公腕下具大爐錘隨拈莖草即現金身豈如小家動多矜飾若三日新婦哉然其後于酒則曰近辭痛飲徒曰休為吏部眠曰心息酒為徒此猶僅節飲至曰老去一杯足可憐甚矣又曰老人因酒病堅坐看君傾曰莫怪執杯遲我衰涕唾煩敗興一至此耶其於食則曰病身虛俊味曰臨餐吐更食似病翻胃者曰絶葷終不改蓋又曽持齋也回視酒肉如山手腳欲旋時真令人短氣乃知天下事未有久而無弊弊而不生厭離者酒食人所以生也甘之至也然且若此況其他乎寄常徴君詩楚妃堂上色殊衆野鶴階前鳴向人語意一褒一貶萬事糾紛猶絶粒果爾常徴君實亦異人所以然者當時天子好道以玄元為始祖故士大夫多留意玄門即鄴侯亦以此遇巷何怪楚宫多餓死之女也信行逺修水筒詩往來四十里荒險崖谷大水筒即所謂筧也今江南山寺處處有之極逺者不過數里未聞長二十里者二十里當費竹幾許防禦修補並難為力不識北土今尚有之否亦可見南北古今之異矣示獠奴阿段詩曽驚陶侃胡奴異胡奴侃子範小字公一時誤用耳何必附會其説貽華陽栁少府詩火雲洗月露絶壁上朝暾自非曉相訪觸熱生病根蓋黎明訪之始知前所謂栁侯披衣笑者乃客到始起也觸熱生病根公亦全用古人語憶鄭南玭題甚佳火詩楚山經月火大旱則斯舉舊俗燒蛟龍驚惶致雷雨又腥至焦長蛇聲吼纒猛虎神物亦髙飛不見石與土謂龍自神靈但驚飛耳非若蛇虎可燒也然龍亦有時可燒北夢瑣言等書具載之公但據所見而言耳毒熱詩千室但掃地閉關人事休貽栁少府詩南方六七月出入異中原老少多暍死汗踰水漿翻唐時楚俗酷熱乃爾耶今恐不至是至江上詩又云江上日多雨蕭蕭荆楚秋髙風下木葉永夜攬貂裘貂裘非嚴寒不可用豈秋夜所宜楚既苦熱決不應至是或言之過也蝮蛇暮偃蹇空牀難暗投炎宵惡明燭況乃懷舊丘謂暗又不可明又不可故思鄉轉切耳晚晴詩鳬鶴終髙去熊羆覺自肥熊羆意屬當時將帥驕貴多藏內府不及所以有自肥之慨獨此語是比何以故若無所託詠物終不及此宿江閣詩鸛鶴追飛盡豺狼得食喧不及此聫古語儘有習而不察者如灧澦如象瞿唐莫上灧澦如馬瞿唐莫下驟讀之但謂形容大石之狀耳及考寰宇記云灧澦堆在瞿唐峽口冬水淺出二十餘丈夏水漲半沒始知象馬喻其小也石露頂愈小則水愈險矣灧澦堆詩巨石水中央江寒出水長謂此也結句干戈遲解纜行止憶垂堂謂避兵應行避水應止二俱險事故進退兩難陪柏中丞宴將士詩醉客霑鸚鵡鸚鵡謂杯也餘解皆繆佳人指鳯皇亦似謂屏障間物與弄玉事固無涉指坐客竒瑞亦無此句法次首繡段裝簷額明言簷額何謂樂工額飾也百戲後歌樵樵字初不可解既而得之曰即俗所謂山歌也棹歌農歌皆歎聲也而皆仍山歌名遡流窮源西北多山山勞而水逸當知古勞歌起於樵採也聽楊氏歌古來傑出士豈待一知巳吾聞昔秦青傾側天下耳翻用伯牙子期事極自負之言從古絶伎真能為不朽者縱驅天下而非之終不能遏抑何用亟亟求知巳也此聽美人歌雖極口讚之乃殊不屬意別自寄慨耳秋日夔府詠懷百韻詩春草何曽歇寒花亦可憐上五字説候暖意特妙共誰論昔事幾處有新阡語意悲愴局促看秋燕羡其飄然欲去即去也誰云行不逮自覺坐能堅所謂不能行而能不行雲臺終日畫青簡為誰編傷濫膺殊錫者名不稱實也當時諸將多位極公孤甚且封王至叛賊窮蹙來歸輒授節鉞僕固懷恩已反尚仍王號公意不識他日史册能繼二十八人後為誰耳身許雙峯寺許字妙門求七祖禪注引七佛偈是祖字誤用也昭王客赴燕以昭王擬李終未妥公自注李宗親有燕昭之美燕周之裔也蓋恐人議之預為之辭耳披拂雲寧在注引衛瓘語不錯謂今雖相隔終當覿面也本自依迦葉何曽藉偓佺唐祖玄元公對宗室直作此語身許雙峯寺知非虛言金箆空刮眼鏡象未忘銓此筌字胡以反不改正送十五弟侍御使蜀詩起句云喜弟文章進送皇華而及文章直作長兄語不有其貴也杜在當時為鼎族宗枝蔓衍集中所稱杜使君令弟之類雖同譜要皆落落無關痛癢惟稱舍弟者乃是同氣耳別崔潩詩志士惜妄動知深難固辭如何久磨礪但取不磷緇公自注云內弟潩赴湖南幕職計此行必有不合難言者故作斯語第二句或別對汲引者言耳送蘇四徯詩乘輿安九重舉今見昔不待更言播遷巴蜀倦剽劫剽劫久而且倦矣故曰下愚成土風也乾坤雖寬大所適裝囊空所謂愁人莫對愁人説也北辰當宇宙南嶽據江湖自是壯語垂白詩樓逈獨移時更不須言登眺曉望詩天清木葉聞更不須言風動葉落此無字句中藏字句也無家病不辭悲不忍讀宿昔詩花驕迎雜樹龍喜出平池花迎龍出都因移仗故然花驕迎雜樹倒句之最不穩者不足法也落日留王母微風倚少兒倚少兒上著微風二字有何交涉政此妙不可言偶題云文章千古事得失寸心知二語古今格言自起至虛傳幼婦詞二十句皆論文章然中敘騷人漢道江左鄴中上不及六經下不及六朝者一則木本水源所不必言一則格調卑下又不足言也車輪徒巳斫堂構惜仍虧蓋得心應手父不能傳之於子故也南海殘銅柱東風避月支月支以比吐蕃意入寇當春時耶避字妙甚吾宗詩在家常早起憂國願年豐寄董嘉榮詩海內久戎服京師今宴朝三百篇獨寤寐宿言宴起之適也公身賦考槃而不忘家國若此第五弟豐詩聞汝依山寺杭州定越州信腕直代家書而句法字法自然一一具足風塵淹別日江漢失清秋只一字而遲回惆悵無限失猶言錯過耳解悶詩陶冶性靈存底物是喚語蓋欲養性頤神只應洗空胸次更有何物應存但結習深重欲罷不能不覺津津用心此道耳憶過瀘戎一首京華應見無顔色紅顆酸甜只自知謂都門但知色變耳不知味亦盡失吾親曽摘食色味皆自知之而已翠瓜碧李沈玉甃謂盛暑中須此解渴所謂浮沈亂水玉落刃嚼氷霜也赤梨葡萄須待寒露始成今梨名秋露白本草葡萄亦八月熟可證先不異枝蔓謂其始瓜蔓如葡萄李枝如赤梨卒乃不得如二物久生此物明指赤梨葡萄耳謂是荔枝不知作何解釋末首若非山谷一一理會人誰解者今本止改須字尚仍勞生重馬此四字不通應改但勞人害馬用對寒壑布衣稍未稱或當更思之耳滿玉壺亦無涉公意使藂生宫中亦如葡萄可釀酒耶先帝貴妃以下四首三詠荔枝不應中隔翠瓜一首側生疑在翠瓜之前録者偶失次第遂使此物二字亦冒認荔枝耳哭王彭州詩將軍臨氣候壯士塞風飇臨氣候猶言乘運塞風飇猶言砥狂瀾也下句勝秋風二首不知明月為誰好早晚孤帆他夜歸會將白髮倚庭樹故園池臺今是非心口自語神思飛越白髮倚庭樹猶詩云巧笑之瑳佩玉之儺也此等句法須熟玩敘事言情自然如天馬行空步驟無迹不作騎驢駸駸矣趙注謂寫眼前景單指上四句則可西閣二首朱紱猶紗帽新詩近玉琴自是清麗唐時之紗帽猶漢末之幅巾士大夫以為雅故青蓮答贈紗帽詩云領得烏紗帽全勝白接㒿山人不照鏡稚子道相宜公詩又有掉頭紗帽側紗帽隨鷗鳥並謂是野逸之服朱紱猶紗帽自笑不相配也豈知千百年後國朝之紗帽竟配朱紱乎經過凋碧栁蕭瑟倚朱樓公時寓居西閣下句猶言車馬入鄰家耳畢娶何時竟消中得自由翻向平語謂因病得間也此亦因首句已有懶字故句法如此此篇甚佳惜結句不稱入海求想指服食夔州以後詩時有此等語謝公鼻音不可強學也社日詩歡娛看絶塞涕淚落秋風所謂異方之樂祗令人悲也夔府書懷云生逢酒賦欺酒賦猶詩酒也唯此二事稱雄餘並不振似為所欺者正自負意漢閣自磷緇本不相比自以仕宦不振類之亦緣唐以前子雲名盛故也拔劍撥年衰倣佛馬伏波據鞍顧盼時此語正頂慙紆德澤私來不如是恐負恩也老人負何竒而自力如此其志可憐矣田父嗟膠漆誠如須溪言總戎存大體降將飾卑詞亦猶雲臺終日畫意殊不滿堯封舊俗疑妙今何遂至此也與薊門誰自北薊門何處覔堯封合看亦可悟琢句法矣恐乖均賦斂不似問瘡痍均賦斂必王命中有之奉行失職使澤不下究徒煩供給結怨于民不似字妙甚千古通弊君門萬里何緣使此語上聞緑林寧小患雲夢欲難追降將卑詞意畢露于此惜時無漢髙使藩鎮禍無已時也耕巖進奕棊謂進客與對奕耳宛然一幅爛柯圖注未是豺遘哀登楚不成句下衣冠迷適楚楚字復用當是越也贈李十五丈詩不聞八尺軀常受衆目憐與古來傑出士豈待一知巳皆重主輕賓語封內如太古時危獨蕭然蕭然謂肅清也江上詩勳業頻看鏡行藏獨倚樓無限欲言不言一時傾吐裕陵獨拈此語可謂具眼時危思報主衰謝不能休不能二字多少懇至戲寄崔蘇詩以阻雨故預思晴日為文酒會耳其後崔評事許相迎不到走筆戲簡詩蓋又不待雨晴便促其衝泥具鞍馬來迎何亟亟若此西閣雨坐詩徑添沙面出湍減石稜生是水退景似與樓雨霑雲幔滂沱朱檻濕不相合何也九日詩題曰九日諸人集于林時尚八日也令節聚集先期相要故命題若此而起句曰九日明朝是也老翁難早出賢客幸知歸辭不赴會也漫看年少樂忍淚已霑衣公生平狂興欲飛不意衰颯至此始悟相要舊俗非蓋火焚而怨燧人耳夜詩疏燈自照孤帆宿新月猶懸雙杵鳴景語耳讀之若不勝情但上句七字一氣下句却斷北書不至雁無情無情上著一雁字此是詩家三昧也南菊再逢人卧病亦是一氣此句却斷步簷二字不佳可惜或作步蟾更不佳鄭監湖亭詩揮金應物理拖玉豈吾身只一虛字入微熾然講道學絶不覺腐氣然何難解結句賦詩分氣象佳句莫頻頻乃幾不可解其嘉謂鄭詩饒氣象吾詩亦復不減似與平分者但老懶不耐篇什往復耳秋興八首古今共推詳其篇製實謂罕儷凡公七言近體毋論清空壯麗風骨無不蒼然此是胎裏帶得所不必言但諸篇時有纍句或率語露語而此獨無之鴻音逺揚壯采錯出華實並茂骨肉恰勻所以衣被千古無間然也或别取清空如話數篇以為極則謂逺勝此不知漸老漸熟始造平淡如富人既飽撤饌但呼茗飲貧兒便謂親見富人如是歸而效之不終日飢涎流矣又王岑諸公早朝詩既極聲容又備風骨並馳詩囿不讓於公然大宗之戴在此不在彼者此復有故蓋題以秋興為名結想故為凄黯雖饒驚采絶艷終不憂妍皮遂褁癡骨斯乃得境界之助非可強為不然一種沈鬱之氣性情本所未具從何得來詩無此不貴所謂窮而後工又所當知也故吾謂秋興取材似賦抽緒似騷至于法脈變化直追風雅且如竹竿發粲于百泉陟岵聆音于無死東山則伊威在目斯干則熊羆入夢並空中綵繪水面雲霞荒忽杳冥無蹤可覔斯乃詞中祕藏象外玄機此詩三首以前取景猶近後之五篇形神俱逺直已飛精輦下厠足朝端雜沓輪蹄從容宴賞每篇止一二語或止數字略點題面耳使他人為之方虞喧客奪席主反受淩而此獨不覺則以抉其祕藏透其玄機故也又五篇一律亦虞其重復不能變化而此又不覺則吾所謂抽緒似騷似復非復也嗟乎枚叟七發少陵八篇何所因仍興盡而止耳後之擬者截鶴補鳬挖瘡加灸我有性情為他人用欲求其工安可得哉藂菊兩開他日淚或注云向日其實過去未來皆得兼之謂後日亦可也凡集中他日類然句法頓挫俯仰悲愴百千年來皆知學杜有幾語得若此者猿啼淚落乘槎上天皆熟爛事聽猿實下三聲淚猶言乃今信之奉使虛隨八月槎猶言徒浪傳耳此用事點化法虛隨謂實未得放舟歸此即前藂菊一聨意也使他人為之復矣筆端變化蓋緣才大法熟所謂長袖善舞也或疑首尾日月相犯不知請看已映字正從落日來何謂相犯如白露團甘子清晨散馬蹄而末云回鞭急鳥棲一詩不妨竟日始成諸家如此類未易悉數曽何拘於此也漁人燕子一聫歸思浩然所謂故園心也漁人忘機燕子必去曰還曰故皆羡其逍遙字法也局促看秋燕正可與下句參看匡衡功名不薄劉向著述竟傳逺慚二人近愧同學是以歎也輕肥上著一自字所謂言不盡意盡即非詩矣魚龍寂寞秋江冷語本易曉何得謂是川名如鸚鵡洲單稱鸚鵡可否獨坐江樓歎飛騰之無日猶之一卧滄江驚嵗晚耳自有解者或云秦州詩水落魚龍夜山空鳥鼠秋何必復贅山川字曰本句中現有山水字但倒出耳子不覺耶且魚龍與鳥鼠對舉則單用亦可何也鳥鼠字舍山名別無泛用也如白狗斜臨北黃牛更在東若非峽名必不如是泛用故可省耳然其下即接云峽雲常照夜是不獨秦州詩山水字倒出在上此詩峽字亦補出在下公詩嚴于法如此何不細觀之況一句中既言川寂又言江冷安得此法瑤池紫氣王母函關公時時有此王母對函關亦如嚴僕射對望鄉臺殊不害其格力也珠簾錦纜菰米蓮房工整極矣乃微嫌合掌必不得已吾寧取拙藂菊兩開他日淚孤舟一繫故園心所以為妙也瞿塘峽口曲江頭只如此對舉意巳躍露不待盡讀始知御氣二字未知所出稍覺欠典珠簾錦纜一聫安得非麗但效之不難耳小時讀此詩結句頗以為嫌謂歌舞語又稍輕又天子現在長安何意祗言自古其後讀史始知爾時有並建五都之説又讀公建都詩云建都分魏闕下詔闢荆門恐失東人望其如西極存時危當雪恥計大豈輕論之句蓋慮乘輿既數蒙塵萬一朝議遷就復踵平王故事失計非小故有斯語耳今人亦多草草看過石鯨鱗甲動秋風與日色才臨仙掌動二動字並竒妙石鯨尢不可測菰米蓮房一聫語異而意同未如黃鶴白鷗以真對假鸚鵡鳯皇以實對虛也昆吾御宿自逶迤紫閣峰隂入渼陂二句中有四地名與青蓮峩眉山月歌四句中有五地名皆大手筆偶然流出不自覺知使有意罏錘豈易到此稻為鸚鵡粒紀實也梧實鳯凰枝不以凡鳥棲故沒其本色也五穀養人乃以飼鳥鳯皇不至梧亦虛名世稱公詩史此等句法頗類史筆言外各有含蓄泛作悲慨語看便嫌合掌又謂之倒句此直頓挫耳不可言倒何以故如鸚鵡啄餘香稻粒可耳鳯凰棲老碧梧枝難通矣本應如是非謂倒也集中倒句請厯數之如野哭千家聞戰伐夷歌幾處起漁樵雄劍鳴開匣羣書滿繫船神傷山行深愁破崖寺古又單句如畫角吹秦晉地僻傷極目春蒲長雪消野涼侵閉户鳬雁宿張燈久拚野鶴如雙鬢等皆是又蕩胸生層雲畫省香爐違伏枕此倒意勝倒字矣又黃鵠高于五尺童化為白鳬似老翁此倒而加幻矣詩文皆莫妙于用倒公倒法又不止此如白骨新交戰雲臺舊拓邊見愁汗馬西戎逼曽閃朱旗北斗殷之類皆倒意也又如復愁詩萬國尚戎馬故園今若何昔歸相識少早已戰場多此章法倒也仲尼曰詞達而已達取直達如水之必東然而千流萬派縱橫曲折不可控揣文章家熟極生巧直達中不能無倒均一倒法變化種種不同亦猶是也作者亦不自知其然公詩用事之妙如玄元廟詩世家遺舊史道德付今王花下飲詩醉歸應犯夜可怕李金吾曲江詩短衣匹馬隨李廣看射猛虎終殘年對月詩牛女漫愁思秋期猶渡河收京詩賞應歌枤杜歸及薦櫻桃遣興詩君看束縛去亦得歸山岡五盤詩地僻無網罟水清反多魚酬髙使君詩三車肯載書傷春詩得無中夜舞誰憶大風歌禹廟詩荒亭垂橘柚古壁畫龍蛇夔府咏懷詩求飽或三鱣秋興詩聽猿實下三聲淚奉使虛隨八月槎雨不絶詩舞石旋應將乳子行雲莫自濕仙衣瀼西新賃草屋詩北郊千樹橘不見比封君秋野詩兒童解蠻語不必作參軍獨坐詩充飢憶楚萍執熱懷李尚書詩不是尚書期不顧山隂野雪興難乘遣悶詩倚著如秦贅過逢類楚狂秋峽詩常怪商山老兼存翊贊功贈盧五丈詩流年疲蟋蟀體物幸鷦鷯頭風詩述作異陳琳送魏司直詩明白山濤鑒嫌疑陸賈裝南極詩亂離多醉尉愁殺李將軍清明詩逢迎少壯非吾道況乃今朝更祓除等句皆得法得趣可為後人之式句法之妙有得力於一字者姑舉五言如出門流水住爐存火似紅老樹空庭得文章憎命達人扶報夕陽醉裏從為客吟詩許更過黃知橘柚來髙枕乃吾廬喧呼閲使星歸及薦櫻桃春風避月支山光見鳥情淚入犬羊天落日邀雙鳥江鳴夜雨懸天意薄浮生白髮好禁春長日容杯酒藂卑春鳥疑亭深到芰荷濳波想巨魚驥病思偏秣江動月移石隱几亦青山禮甘衰力就喪亂獨前途部曲異平生白露誰能數湘娥倚暮花青眼只途窮拔劍撥年衰聲拔洞庭湖寒江動夜扉又花亞欲移竹鳥窺新捲簾勳業頻看鏡行藏獨倚樓江閣嫌津栁風帆數驛亭白屋留孤樹青天失萬艘吳楚東南坼乾坤日夜浮眼穿當落日心死著寒灰江山有巴蜀棟宇自齊梁揮金應物理拖玉豈吾身流年疲蟋蟀體物幸鷦鷯大江秋易盛空峽夜多聞風蹀勤依槳春鷗懶避船蛟龍纒倚劍鸞鳯失吹簫仰蜂粘落絮倒蟻上枯梨蕩胸生層雲決眥入歸鳥聲吹鬼神下勢閲人代速等句或寫難狀之景如在目前或含不盡之意見於言外然而用字初無詭僻取景亦甚尋常政不必倒海探珠傾崑取琰也但於爐錘之際有神用存焉耳五言古起句佳者為出門復入門兩腳但仍舊長嘯宇宙間髙才日凌替紈袴不餓死儒冠多誤身丈人屋上烏人好烏亦好死別已吞聲生別常惻惻浮雲終日行遊子久不至出門日已逺不受徒旅欺挽弓當挽強用箭當用長從軍十年餘能無分寸功十日畫一水五日畫一石九載一相逢百年能幾何青山淡無姿白露誰能數溪回松風長蒼鼠竄古瓦蒼山八百里崖斷如杵臼平明跨驢出未知適誰門行雲遞崇髙飛雨藹而至驄馬新鑿蹄銀鞍被來好南風作秋聲殺氣薄炎熾勞生共乾坤何處異風俗自為青城客不唾青城地汝陽讓帝子眉宇真天人天台隔三江風浪無晨暮赤驥頓長纓非無萬里姿岱宗夫如何齊魯青未了燈影照無睡心清聞妙香崆洞小麥熟且願休王師我行入東川十步一回首百川日東流客去亦不息翳翳桑榆日照我征衣裳連峰積長隂白日遞隱見下馬古戰場四顧但茫然雞鳴風雨交久旱雨亦好賈生慟哭後寥落無其人髙臺面蒼陂六月風日冷漆以用而割膏以明自煎其結句佳者為天寒翠袖薄日暮倚修竹此生免荷殳未敢辭路難少年別有贈含笑看吳鈎煌煌太宗業樹立甚宏達水深波浪濶毋使蛟龍得白鷗波浩蕩萬里誰能馴送行勿泣血僕射如父兄借問大將誰恐是霍嫖姚功名圖麒麟戰骨當速朽捷下萬仞岡俯身試褰旗潛身備行列一勝何足論夜闌更秉燭相對如夢寐齒髮已自料意深陳苦辭生涯能幾何常在羇旅中妻孥隔軍壘撥置不擬道百靈未敢散風破寒江遲相看俱衰年出處各努力濁醪有妙理庶用慰沈浮食蕨不願餘茅茨眼中見中原未解兵吾得終疏放歎息謂妻子吾何隨爾曹冥冥子規叫微徑不復取豫恐樽中盡更起為君謀一請甘飢寒再請甘養蒙焉知南鄰客九日猶絺綌大哉乾坤內吾道常悠悠吞聲勿復道真宰意茫茫壯心不肯已欲得西擒胡明朝在沃野苦見塵沙黃方圓茍齟齬丈夫多英雄罷官亦由人何事拘形役庶與達者論吞聲混瑕垢相望無所成乾坤莽回互歸來懸兩狼門戶有旌節惟有摩尼珠可照濁水源七言古起句佳者為堂上不合生楓樹怪底江山起煙霧長安城頭頭白烏夜飛延秋門上呼自斷此生休問天杜曲幸有桑麻田巢父掉頭不肯住東將入海隨煙霧孔雀未知牛有角渴飲寒泉逢抵觸王郎酒酣拔劍斫地歌莫哀吾能拔爾抑塞磊落之竒才嵯峨白帝城東西南有龍湫北虎溪文章有神交有道端復得之名譽早疾風吹塵暗河縣遊子隔手不相見有客有客字子美白頭亂髮垂過耳長鑱長鑱白木柄我生託子以為命四山多風溪水急寒雨颯颯枯樹濕男兒生不成名身已老三年飢走荒山道天下幾人畫古松畢宏已老韋偃少今夕何夕嵗云徂更長燭明不可孤今日苦短昨日休嵗云暮矣增離憂繅絲須長不須白越羅蜀錦金粟尺知章騎馬似乘船眼花落井水底眠逼側復逼側我居巷南子巷北諸公袞袞登華省廣文先生官獨冷君不見道傍廢棄池君不見前者摧折桐天上浮雲如白衣須臾改變如蒼狗其結句佳者為短衣匹馬隨李廣看射猛虎終殘年會將白髮倚庭樹故園池臺今是非逢迎少壯非吾道況乃今朝更祓除雞蟲得失無了時注目寒江倚山閣安得并州快剪刀剪取吳淞半江水若耶溪雲門寺吾獨胡為在泥滓青鞋布襪從此始忽憶雨時秋井塌古人白骨生青苔如何不飲令心哀哀哉王孫慎勿疏五陵佳氣無時無黃昏胡騎塵滿城欲往城南忘城北仲宣樓頭春色深青眼髙歌望吾子眼中之人吾老矣君不見朝來割素鬐咫尺波濤永相失君不見金粟堆前松柏裏龍媒去盡烏呼風志士幽人莫怨嗟古來才大難為用嗚呼何由眼前突兀見此屋吾廬獨破受凍死亦足如今豈無腰裊與驊騮時無王良伯樂死即休巴東之峽生凌澌彼蒼回幹人得知若道巫山女粗醜何得此有昭君村未試囊中餐玉法明朝且入藍田山婁公不語宋公語尚憶先皇容直臣青絲絡頭為君老何由却出橫門道既稱絶世無天子何不喚取守京都君知天地干戈滿不見江湖行路難五言律起句佳者為花飛有底急老去願春遲客裏有所適歸來知路難茂陵多病後尚愛卓文君涼風起天末君子意如何西京安穩未不見一人來安穩髙詹事兵戈久索居昔別是何處相逢皆老夫無家對寒食有淚如金波死去憑誰報歸來始自憐亂後誰歸得他鄉勝故鄉不獨避霜雪其如儔侣稀何恨倚山木吟詩秋葉黃客睡何曽著秋天不肯明令節成吾老他時見汝心相近竹參差相過人不知摧折不自守秋風吹若何帶甲滿天地胡為君逺行四更山吐月殘夜水明樓江城秋日落山鬼閉門中草閣臨無地柴扉永不關為客無時了悲秋向夕終不識南塘路今知第五橋山豁何時斷江平不肯流浩浩終不息乃知東極臨巫峽中宵動滄江十月雷江漢思歸客乾坤一腐儒扶病送君發自憐猶不歸春江不可渡二月已風濤落日在簾鈎溪邉春事幽用拙存吾道幽居近物情翠柏苦猶食明霞髙可餐昔聞洞庭水今上嶽陽樓納納乾坤大行行郡國遙禮樂攻吾短山林引興長冠冕通南極文章落上台九農成德業百祀發光輝永與清溪別蒙將玉饌俱髙浪垂翻屋崩崖欲壓牀唐堯真自聖野老復何知野日荒荒白春流泯泯清舊俗疲庸主羣雄問獨夫二儀積風雨百谷漏波濤更欲投何處飄然去此都慘淡風雲會乘時各有人文章千古事得失寸心知大雅何寥濶斯人尚典型不謂生戎馬何知共酒杯軒轅休製律虞舜罷彈琴衛侯不易得余病汝知之相見各頭白其如離別何其結句佳者為萬方頻送喜毋乃聖躬勞明朝有封事數問夜如何誰能更拘束爛醉是生涯不知西閣意肯別定留人淺把涓涓酒深慿送此生為問南溪竹抽梢合過牆前村山路險歸醉每無愁經過自愛惜取次莫論兵聞道蓬萊殿千門立馬看白鷗原水宿何事有餘哀今秋天地在吾亦離殊方蓬鬢稀疏久無勞比素絲嘗怪商山老兼存翊贊功時危思報主衰謝不能休親朋滿天地兵甲少來書誰家挑錦字燭滅翠眉嚬宫中行樂祕少有外人知為報鴛行舊鷦鷯在一枝兒童解蠻語不必作參軍何當一百丈攲蓋擁髙簷匡山讀書處頭白好歸來文章差底病回首興滔滔人傳有笙鶴時過北山頭細雨荷鋤立江猿吟翠屏悲絲與急管感激異天真草玄吾豈敢賦或似相如囊空恐差澀留得一錢看不能隨皂蓋自醉逐浮萍應共寃魂語投詩贈汨羅不知臨老日招得幾時魂本無軒冕意不是傲當時飛來雙白鶴過去杳難攀興移無灑掃隨意坐莓苔萬方聲一槩吾道竟何之驍騰有如此萬里可橫行看君用幽意白日到羲皇無由覩雄略大樹日蕭蕭歸路翻蕭颯陂塘五月秋曉看紅濕處花重錦官城歸朝日簮笏筋力定如何防身一長劍將欲倚崆洞君見窮途哭宜憂阮步兵江湖多白鳥天地有青蠅樽前江漢濶後會且深期清霜洞庭葉故就別時飛此身醒復醉不擬哭途窮再窺松柏路還見五雲飛倘歸免相失見日敢辭遲亂離多醉尉愁殺李將軍家家賣叉釧準擬獻春醪七言律起句佳者為一片花飛減却春風飄萬點正愁人舍南舍北皆春水但見羣鷗日日來雀啄江頭楊栁花鵁鶄鸂鶒滿晴沙萬里橋西一草堂百花潭水即滄浪羣山萬壑赴荆門生長明妃尚有村南極老人自有星北山移文誰勒銘野老籬邊江岸回柴門不正逐江開暮倚髙樓對雪峰僧來不語自鳴鍾夔府孤城落日斜每依北斗望京華聞道長安似奕棊百年世事不勝悲瞿塘峽口曲江頭萬里風煙接素秋昆吾御宿自逶迤紫閣峰隂入渼陂霜黃碧梧白鶴棲城上擊柝復烏啼搖落深知宋玉悲風流儒雅亦吾師錦里先生烏角巾園收芋栗未全貧為人性僻耽佳句語不驚人死不休竹裏行厨洗玉盤花間立馬簇金鞍江草日日喚愁生巫峽泠泠非世情城尖徑仄旌斾愁獨立縹眇之飛樓汶上相逢年頗多飛騰無奈故人何處處清江帶白蘋故園猶得見殘春風急天髙猿嘯哀渚清沙白鳥飛回秋日野亭千橘香玉杯錦席髙雲涼君王臺榭枕巴山萬丈丹梯尚可攀中天積翠玉臺遙上帝髙居絳節朝竹寒沙碧浣花溪橘刺藤梢咫尺迷白帝城中雲出門白帝城下雨翻盆老去悲秋強自寬興來今日盡君歡支離東北風塵際漂泊西南天地間年年至日常為客忽忽窮愁泥殺人幽棲地僻經過少老病人扶再拜難西山白雪三城戍南浦清江萬里橋其結句佳者為明年此會知誰健醉把茱萸仔細看不是尚書期不顧山隂野雪興難乘劍南春色渾無賴觸忤愁人到酒邊共説總戎魚鳥陳不妨遊子芰荷衣鵬礙九天須却避經三窟莫深憂杖藜歎世者誰子泣血迸空回白頭楚江巫峽半雲雨清簟疏簾看奕棋飛閣卷簾圖畫裏虛無只少對瀟湘寒衣處處催刀尺白帝城髙急暮砧同學少年多不賤五陵裘馬自輕肥魚龍寂寞秋江冷故國平居有所思一臥滄江驚歲晚幾回青瑣點朝班故慿錦水將雙淚好過瞿唐灧澦堆艱難苦恨繁霜鬢潦倒新停濁酒杯巡簷索共梅花笑冷蕊疏枝半不禁庾信平生最蕭瑟暮年詩賦動江關白沙翠竹江村暮相送柴門月色新即從巴峽穿巫峽便下襄陽向洛陽浣花溪裏花饒笑肯信吾兼吏隱名雲白山青萬餘里愁看直北是長安春花不愁不爛漫楚客惟聽棹相將南望青松架短壑安得赤腳踏層氷窮巷悄然車馬絶案頭乾死讀書螢風水春來洞庭濶白蘋愁殺白頭翁寄柏學士詩歎彼幽棲載典籍蕭然暴露倚山阿奔波兵革間獨載書入山閉門誦讀與古人為徒斯實佳士古人成敗子如何公蓋示以讀書法也論古人直須歸到身上不然典籍于我何與咏懷古迹詩伯仲之間見伊吕指揮若定失蕭曹議論既卓格力矯然自是名句世所同諷然吾謂此是論斷非詩也老筆橫溢隨興所至偶然超軼尋常原非正格若總如此亦復非難魯直天於萬物定貧我智效一官全為親永叔朝廷失士有司恥貧賤不憂君子難彼皆才士又極摹杜而若此者蓋誤以此等句為式故也何不學三分割據紆籌䇿萬古雲霄一羽毛相去幾許三分割據紆籌䇿紆字下得好籌策儘自不凡但以三分故不免紆曲耳然猶人所能言萬古雲霄一羽毛讚武侯者多矣欲以片言肖其神更千百年求如此語不可得張旭草書歌俊拔為之主一語真知書者連山蟠其間溟漲與筆力所謂俊拔也暮年思轉極未是到語旭書已入神品復何待思臨池之法與詩文不同此二語公殆自道耳送楊監赴蜀詩起句去水絶還波末復云泛舟巨石橫登陸草露濕皆今人所甚諱者離別重相逢偶然豈足期改足為定便是小兒語孟冬詩殊俗還多事方冬變所為其下但言破甘嘗稻而已未見所謂多事者何在也雷詩巫峽中宵動滄江十月雷龍蛇不成蟄天地劃爭回却碾空山過深蟠絶壁來六句字字好結語不為佳西閣夜詩擊柝可憐子無衣何處村十字一氣周匝最可法中宵詩親朋滿天地兵甲少來書是回互語非兵甲故當不至此所謂詩可以怨也南極詩亂離多醉尉愁殺李將軍是真實語窮途讀此自難為情飛星過水白過字平聲不寐詩心弱恨容愁即常非月不知心大小容得許多憐也縮二句為一句耳猿詩艱難人不免隱見爾如知味絶雋永黃魚詩長大不容身非謂不容其長大怪爾許長大無䇿自全也龍則有風雷自衛涎沫噴薄泥沙盡捲筒筒不敢近矣注未是白小詩風俗當園蔬禮記蜩范芝栭得一注腳鹿詩于諸詠物中可謂拔乎其萃不意淋漓滿志至此雞詩問俗人情似謂世俗餽遺多用之也人情二字俗語至今如是似字諺所謂盤來盒去耳結句氣交亭育際巫峽漏司南幾不可解司南想謂報曉漏是遺漏合頷聫殊方聽有異失次曉無慙觀之必是此土曉雞或遲或早不應時候也寄杜位詩天地身何往風塵病敢辭十字恨甚西閣曝日詩毛髮具自和具俱也若言本自即不煩曝日縛雞行前七句俚甚末句不深不淺恰在個中千古膾炙蘇黃有意效之轉入理路所謂學而後知其難黑白二鷹詩在野只教心力破千人何事網羅求千字誤非干字即于字也一生自獵知無敵百中爭能恥下鞲自獵無可較量定知無敵假使逐隊爭能縱百發百中猶恥之直將此鳥入大豪傑數中句法變化周匝更自到家次首不如前春雁同歸必見猜題中恐臘後春生騫飛避暖正為此句而設杜詩攟卷三
