body:
  text: 杜詩攟别集類一唐提要臣等謹案杜詩攟四巻明唐元竑撰元竑字逺生烏程人萬厯戊子舉人明亡不食死論者以首陽餓夫比之是編乃其讀杜詩逐首劄記所閲蓋千家注本其中附載劉辰翁評故多駁正辰翁語自宋人倡詩史之説而箋杜詩者遂以劉昫宋祁二書據為稿本一字一句務使與紀傳相符夫忠君愛國君子之心感事憂時風人之㫖杜詩所以髙於諸家者固在於是然集中根本不過數十首耳咏月而以為比肅宗咏螢而以為比李輔國則詩家無景物矣謂紈袴下服比小人謂儒冠上服比君子則詩家無字句矣元竑所論雖未必全得杜意而刋除附會涵泳性情頗能㑹于意言之外其中如白鷗没浩蕩句必抑蘇軾而申宋敏求宛馬總肥秦苜蓿句正用漢武帝離宫種苜蓿事而執誤本春苜蓿字以為不對漢嫖姚又往往喜言詩讖尤屬不經然大㫖合者為多勝舊注之穿鑿逺矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:35fbd76a25dc82dba3c45df01ea371461d6ae8dd61c2e0068497c8dd6daf4401
