body:
  text: 杜詩攟卷四明唐元竑撰瀼今皆讀音壤注乃黨切又奴浪切皆當作灢蓋字誤故音誤也還從上聲為是懷鄭典設詩岸髙瀼滑限西東又作平聲讀矣當繇土音無定故耶又赤甲本當作岬自公偶誤書今千古遂不可變矣送王判官詩買薪猶白帝鳴櫓少沙頭少謂少頃不通作已字是也不離西閣詩結云不知西閣意肯別定留人與聞汝依山寺杭州定越州二定字俱妙肯別定留人尤極宛轉頓挫其法亦自三百篇來上帝不寧不康禋祀居然生子是也無家住老身住改任字佳滄海先迎日亦何減海日生殘夜銀河倒列星倒字妙河在天上乃覺星倒即圓覺經所謂雲駛月運舟行岸移也海已出日河猶倒星故曰平生耽勝事吁駭始初經題曰不離西閣意頗難會蓋將別而未忍別故作斯語也自此即遷居赤甲矣公窮居西閣且一年至臨去始一望見海日豈老懶不能夜起故失之耶即此亦自應增其戀戀也入宅詩花亞亦移竹竹礙花故練句極妙非親厯此景欲下一語不知其不可及也鳥窺新卷簾性情形態畢具一字中畫家翎毛誰當此者二句尤妙是新遷語江流氣不平一句自足千秋江雨詩寵光蕙葉與多碧點注桃花舒小紅寵光點注皆佳與多碧未老雨不絶詩舞石旋應將乳子行雲莫自濕仙衣用事之極得趣者晝夢詩桃花氣暖眼自醉野人間適甘味自知故鄉門巷荆棘底中原君臣豺虎邊咏晝夢何以及此所謂白日欲寢也身世雙蓬鬢乾坤一草亭路經灧瀲雙蓬鬢天入滄浪一釣舟意絶相類語各自妙不相上下也喜觀即到詩病中吾見弟書到汝為人直是一團精神無復字句江閣嫌津栁意馳景外風帆數驛亭景在意中花間馬嚼金鞍去樓上人垂玉筯看何如一嫌字即孤帆逺影碧空盡惟見長江天際流亦何如一數字公一生持論無非王道晚登瀼上堂詩忽云凄其望吕葛不復夢周孔蓋緣羣盜接踵急則治標其意以吕葛周孔分文武二途耳不知周孔自足兼吕葛也覆舟詩羈使空斜影諸葛廟詩巫覡醉蛛絲敘事簡妙白描神品行官張望補稻畦水起句東屯大江北百頃平若案夔州歌亦云東屯稻畦一百頃公素貧薄何從遽得爾許田也縱山田薄收不比季子洛陽田亦斷不憂旅食又有瀼西果林四十畝彌不落莫亦可見當時彼中田地價賤易得也其後竟從瀼西移居之老年保此儘可沒齒然住僅歲餘又有江陵之遷何哉據續得觀書詩起云自汝到荆府書來數喚吾則其捨東屯也蓋因其弟相招而結云馮唐雖晚達終覬在皇都則楚蜀浮居皆非公意意在歸朝耳江天漠漠鳥雙去風雨時時龍一吟浩渺空濛宛然在目夔州歌霸王併吞在物情王字去聲并字平聲集中并吞字多作平聲讀胡後溪云齊魯大臣二人史失其名黃四娘託杜詩乃得不朽豈獨黃四娘如𨽻人伯夷辛秀信行獠奴阿段行官張望女奴阿稽等皆以輿臺附名毫端遂傳千古真可謂厚幸也𨽻人名伯夷可怪嘗見急就章有栁堯舜藥禹湯之名以為作者戲撰未必真有其人然當武后時自有同州人名魯孔邱為拾遺者舉朝不聞以為駭則此𨽻人又不足言矣負薪採梠時兒女餓死者數人伯夷乃幸獲免阻雨不得歸瀼西甘林詩虛徐五株態側塞煩胸襟地且四十畝甘僅五株便稱林耶甘林詩與上後園山腳詩皆觸目感時偶借題説起耳月詩魍魎移深樹謂清光如晝鬼魅避形也魍魎明靈之鬼公殆未寓目楞嚴經耳如南華魍魎問影下語便自了了斯時梵典尚未入支那誰謂漆園荒唐寄劉伯華使君詩逺山朝白帝深水謁夷陵朝帝似堪輿家言謁陵更巧雕刻初誰料纎毫欲自矜神融躡飛動戰勝洗侵陵與許十一讚語並超軼不凡初誰料謂不料至此也此使君寄詩自後人觀之未免班門弄斧觀卷軸來何晚聊從月繼徴句公得一佳篇應時刮目且欲盡讀其餘何懇懇也獻吉于鱗目中無復人古今不相及當非虛語姹女縈新裏八句劉必好神仙家言張兵撓棘矜所謂心兵也夢弼解是飢鼯訴落藤訴字匪夷所思野食待魚罾覺衡門詩不須更誦青竹幾人登猶云竹葉於人既無分今竹葉句千古口實而青竹幾無人能解同一人所作優劣相倣而冷熱頓異至此詩亦有遇不遇也江湖多白鳥天地有青蠅對極工矣妙是結句草閣詩草閣臨無地柴扉永不關極是幽意元道州舂陵行語質情懇絶類沈千運但兩篇皆直賦時事耳絶無比興公詩小序乃曰不意復見比興體制微婉頓挫之詞何也寄韓諫議詩語特竒恣荒忽遂以留侯相比豈僅因一韓字故耶據詩韓殆暮年留滯者焉得置之貢玉堂尋文解義應是致字不然則句法應中斷焉得置之耶貢玉堂乃佳也鋤斫果林移牀詩背堂資僻逺謂幽閴之境隱人所資也山雉防求敵求敵似用安仁射雉賦中意防者其一方安間自適防彼求敵也一句中繪出雙雉公熟精文選遂不覺後人難解江猿應獨吟謂哀音相類也泄雲字不為佳然公屢用之資防應字俱穩不為突兀薄俗防人面全身學馬蹄較不寐防巴虎全生狎楚童更勝學馬蹄即狎楚童蒙莊非僻書熟字生用耳沙虛岸只摧所謂常苦沙崩損藥欄也若屢摧數摧復有何致此用字之妙中夜詩中夜江山靜是苦語戰伐塵髙不堪極目夜深始靜耳復愁詩萬國尚防寇防寇字今本作戎馬似佳身覺省郎在一首謂若非省郎尚在則柴扉早失矣薄俗人情古今一律他人意中不能言亦不肯言者正觀銅牙弩一首只作紀事讀無限感慨一比便欲少味胡虜何曽盛何曽字殊自負閭閻聽小子談笑覔封侯亂世自媒滔滔皆是然豈獨餘人政恐房太守亦未免斯語今日翔麟馬一首是憤語上施恩而下負德是以憤也當時括百官馬送軍中公遂徒步逼側行所以作也任轉江淮粟一首足見識力公信非迂腐者每恨陶彭澤無錢對菊花如今九日至自覺酒須賖只一賖字無錢之歎琅然入耳雋永無極此詩題曰復愁十二篇中不見一愁字却各有愁意又各自為意一波未息一波復起但語多引而未盡末篇吟多意有餘自評甚確然公顧自謂拙不知正此為工九日詩野樹敧還倚畫出醉態秋砧醒却聞因醒後始覺醉時之適句意工妙季秋江樓夜宴詩星落黃姑渚秋辭白帝城二地名配得絶有情尤妙在有意無意之間贈李八祕書詩事殊近代邸喜異賞朱虛蓋祕書亦以靈武之役拜官與公同故曰同補袞曰舊交也奉詔許牽裾語極得體忠愛藹然不必詔求直言但官以拾遺為名即為奉詔矣對敡坑士卒乾沒費倉儲勢藉兵須用功無禮忽諸此數者公所憤也對揚字貫下四句略似行文法坑士卒復齋漫録引上林賦欲改坑為抗雖亦細心然何如坑字明白但濫殺便可借用豈必定如白起哉勢藉句意當時方藉藩鎮討叛逆而觀望不肯進戰者功無句謂朝廷濫賞可訝不足為勸也移居東屯茅屋詩平地一川穩髙山四面同次首云林僻此無蹊想見佳境令人神越第四首幽獨清深四字乃公自繪新居圖復自評之也淹留為稻畦旅人真語其後復至東屯詩云峽裏歸田客復還東屯詩云復作歸田去猶殘穫稻功詠懷詩云稻穫空雲水川平對石門當知此遷居專為便于種田耳市喧宜近利公自注西居近市然意實不以近利為宜只欲出下句林僻此無蹊故結云若訪衰翁語須令勝客迷勝客且迷況于俗人則雖市喧無傷也賸客不通須溪改勝字是道北馮都使復是何人豈其新鄰耶枕帶還相似柴荆即有焉枕即髙山四面帶即平地一川但擁茅屋數椽即此山川皆吾有也若髙齋見一川此又馮齋中石渠小沼非即平地一川矣解纜不知年謂今日移居此地不知住得幾時乃放舟他適甫遷即懷去志末首結云寒空見鴛鴦回首想朝班蓋無日不思還朝也少陵許西鄰婦撲棗今人以為口實然僅與髙秋總餧貧人實例舉耳詳詩意更不止此乃是公移居東屯後虛瀼西草堂以與吳司法此棗樹定在交界口公在日便乞與之公去而寡婦插籬為界公恐吳有言故代為周旋即防逺客雖多事使插疏籬却甚真逺客指吳防者寡婦防之使者公使之當知不必真公使之須如是吳始默然耳賑鄰之乏人或能之業捨之他適矣誰肯始終斡旋若此且委曲入人使吳意消而不覺大用之即宰相作略也覃山人隱居詩較常徵君詩更切林下何曽見一人真非虛語也西莊王給事可謂吏隱公猶有柴門深閉之語況覃常乎近或解為哀挽之作哀挽詩豈用南極老人作起語也東屯月夜詩月挂客愁村與天橫醉後參句法同妙讀此詩及寫懷詩夜深坐南軒明月照我膝驚風翻河漢梁棟已日出公玩月往往達旦老興難及秋野詩曝背竹書光本屬無謂偶坐日中眼到忽來耳濳鱗輸駭浪却是駭浪輸潛鱗輸字中有冷笑歸翼會髙風謂會當有髙風時兩語開闔練字意濃大江秋易盛空峽夜多聞妙句不可多得傷秋詩結句何年減豺虎似有故園歸似對真看未敢望真歸也最是傷意雨詩兵戈浩未息蛇虺反相顧即魑魅喜人過意也又云尫羸愁應接俄頃恐違忤防人甚蛇虺耶一命須屈色已不堪矣窮荒益自卑真難為懷浮俗何萬端言外當有難具陳者結思扶病入舟避之浮俗云何使至此極南遷東屯遽有此語蓋未嘗一日安也傷哉瞿唐兩崖詩入天猶石色穿水忽雲根可謂備盡形容猱玃鬚髯古直是畫意蛟龍窟穴尊尊字無人道得題意躍然傳神在阿堵中羲和冬馭近愁畏日車翻因水險故然已涉用意若更指時事便須重譯且日車翻非所宜言暝詩半扉開燭影欲掩見清砧清砧已聞因掩扉偶見之殊無緊要然聞砧更僕難數見砧一而已正不可少此雲詩龍以瞿唐會奇甚真足驚人收穫辭霜渚收穫與題何涉天池詩百頃青雲杪曽波白日中又魚龍開闢有菱芡古今同讀之真令我作誅苑想萬里狎漁翁句佳獨坐詩暖老須燕玉貧病老人偶爾道及實不作此妄想充飢憶楚萍正補上意楚萍豈充飢物司空見慣應怪語不相比矣衰遲哀怨正爾傾吐如訴也如石門宴集詩華筵直一金大類元亮瓶無儲粟世有一杯羮直三萬錢者以告貧士豈肯信哉白帝樓詩春歸待一金待止一金石門之筵安得不謂華也雨詩秋日新霑影下又云天晴忽散絲所謂東邊日出西邊雨也日影非新新為所霑耳霑字阿誰道得寒江舊落聲未雨時先有江聲舉舊正見兼新句法之妙後人不能學返照詩荻岸如秋水栁司馬至詩幽燕唯鳥去俱妙第難為對句耳向夕詩雞栖草屋同一句中畫出群雞有趣結句琴書散明燭長夜始堪終謂老人多不寐也九月三十日起句為客無時了悲秋向夕終創語深悲出人意表恆言悲秋秋尚有了時不比為客也後六句瘴餘霜薄草翠花紅皆言南方候暖異故鄉耳十月一日詩有瘴非全歇為冬亦不難夜郎溪日暖白帝峽風寒亦是雙頂遣悶二首家家養烏鬼頓頓食黃魚若言鸕鷀即二句一意通章嵌此無謂矣南人染病竸賽烏鬼微之詩既可證公素不語怪章法要為近之但養不可訓供安知彼俗養烏鬼不别有法也舊識難為態悉其平生故公孫丞相寧逢惡賓坐此耳移居東屯詩斫畬應費日此詩畬田費火聲費字從彼來相去多少詩之所以不厭深索也兩結句各一意髙枕所謂用拙存吾道耕鑿所謂幽居近物情事理正爾並行不然悶未易遣復還東屯詩築場憐穴蟻拾穗許村童事雖至微充此仁心不可勝用刈稻了詠懷詩野哭初聞戰樵歌稍出村即野哭千家聞戰伐夷歌幾處起漁樵也縮為五字耳須溪何用别索栁司馬至詩霜天到宫闕戀主寸心明句法猶今晨清鏡中勝食齋房芝余髮喜却變白間生黑絲蓋髮字倒出耳神馳魏闕非寒逈之謂自平詩自平宫中吕太一收珠南海千餘日近供生犀翡翠稀復恐征戍干戈密蓋因貢賦不時知蠻族已驕恐用兵未幾復須用兵也蠻溪豪族小動搖世封刺史非時朝謂邉民不靜土官即宜入朝今乃并職貢有虧矣蓬萊殿裏諸主將才如伏波不得驕伏波小斷朝廷命將甚易驕恣豈得計乎小時讀此不遽能省故為解之此等敘事如畫家逺景人或無目樹或無枝最工取勢咫尺萬里但不可令白家老婢知耳蓬萊殿裏二句雖俱七言實則上句十一字下句三字也唐人絶句云明月在天將鳯管夜深吹向玉宸君雖俱七言實則上句四字下句十字也但明月句意盡語中杜二句中間猶藏有字句在此為異耳虎牙行紀異候也南國候暖秋風忽起驟寒難禁反似北方故曰朔漠氣山鬼幽憂雪霜逼甚詞也猶曰蜀犬吠雪耳楚老長嗟憶炎瘴三尺角弓兩斛力尋常形容苦寒想不到此犬戎鎖甲聞丹極聞字不可作圍八荒十年防盜賊此句上原無脫句賊哭臆三句三韻結法如此讀前後苦寒行四首是冬果大雪至於猛風拔木發屋虎豹哀號此詩其霰之先集乎更覺山鬼逺慮非過矣寫懷詩勞生共乾坤何處異風俗便自曠達忘情任榮辱更非見道不及此然令嚴鄭公在當無此言無貴賤不悲無富貧亦足等語遂開樂天法門用心霜雪間不必條蔓緑似近似逺極有意次首羣生各一宿飛動自儔匹吾亦驅其兒營營為私實真語動人乃勝道學禍首燧人氏厲階董狐筆君看燈燭張轉使飛蛾密雖涉議論却是至言終契如往還得匪合仙術定有誤字公孫大娘弟子舞劍器行來如雷霆收震怒須溪解收字亦有意但直謂如雷如霆亦何不可雷霆不可者羿射九日羣帝驂龍又若何小時讀此詩嫌劍器字太俚後讀小説教坊雜録始知劍器子乃舞曲名也又怪公孫大娘以婦人工舞劍馳名後世惜其無所見長今始悟是俳優伎倆蓋與柘枝胡旋等同為戲耳但取眩目美觀必非真可臨陳禦敵取勝也或疑審如是少陵詩猶或過譽長史何緣遂悟筆法曰此不足怪凡悟者皆因火候既到偶然觸發略如參禪牆壁瓦礫蝦蟇蚯蚓皆可發機如擔夫與公主爭道亦可悟筆法擔夫有何竒特公孫舞劍吾但決其不可臨陳耳至於頓挫合節熟極生巧逈出流輩如公序中所云何不可悟筆法也寒雨朝行視園樹詩柴門擁樹向千株丹橘黃甘此地無瀼西果林既四十畝東屯擁樹亦向千株公所到處不乏幽勝也甘橘喜暖北地所稀次句尚憶五株甘林耳白鳬行君不見黃鵠髙于五尺童化為白鳬似老翁倒語竒怪老筆故作此欲人不測篇中大抵遲暮之感自歎轉退追念少時可意而得也錦樹行始終只顛倒二字起句今日苦短昨日休苦短則今不如昨然今正及時昨已休矣霜凋碧樹作錦樹應蕭條者反爾粲爛正是顛倒青草萋萋盡枯死天驥跛足隨氂牛語極憤悶聖賢薄命已下幾于罵矣夔後語言多亂雜此詩憤則有之却不亂雜夜宿西閣詩稍通綃幕霽謂隔帷辨色也此詩與下西閣口號呈元二十一詩俱在寓居西閣時誤列于此耳寄從孫崇簡詩牧叟樵童亦無賴莫令斬斷青雲梯謂欲從之仙隱也亦是索酒意青雲不喻富貴此又一證送卿二翁統節度鎮軍還江陵詩落日渭陽情注卿二翁姓崔乃公舅氏因此語也驟閲卿二翁知是何物此稱謂太新夜歸詩庭前把燭嗔兩炬難解豈貧家惜費耶夜聞􅓋篥詩君知天地干戈滿不見江湖行路難與此生免荷殳未敢辭路難語一直一婉彼為自慰之詞此則訴人之語並極哀怨須溪以荷殳意解此誤矣前後苦寒行如凍埋蛟龍南浦縮三足之烏足恐斷六龍寒急光徘徊崑崙天關凍應折白鵠翅垂眼流血等皆形容語也如寒刮肌膚北風利崖沈谷沒白皚皚楚江巫峽氷入懷虎豹哀號又堪記晚來江間失大木猛風中夜飛白屋萬里飛蓬映天過孤城樹羽揚風直等皆實録也據公云南紀巫廬瘴不絶太古以來無尺雪不謂古來無雪但無盈尺者耳去年白帝雪在山所謂南雪不到地也今年白帝雪在地至於崖沈谷沒蓋次年更甚前後苦寒四首並次年作也諸篇淋漓酣暢殊不似凍筆巴東之峽生凌澌彼蒼回幹人得知語味含吐便不必言朔漠氣矣人得知與寒可回酒易沽同一語氣續得觀書詩俗薄江山好時危草木蘇須溪注上句云無情者不變余為續注下句云有情者不與俱蘇也白帝城放舟出峽詩惡灘寧變色髙臥負微軀謂涉險不懼乃是不惜身命有負此軀負字怨甚與前村山路險歸醉每無愁俱不堪讀書史全傾撓裝囊半厭濤可謂險矣故又曰死地脫斯須也飄蕭將素髮汩沒聽洪爐聽洪爐謂委順造物此生遭聖代誰分哭窮途與豈知秋禾登貧窶有倉卒同是咄咄怪事無控訴者寄族弟唐十八使君詩與君陶唐後盛族多其人唐杜共祖遂稱族弟今人無此稱矣行次古城店詩風蝶勤依槳春鷗懶避船勤懶字妙得情態王門髙德業幕府盛材賢行色兼多病蒼茫泛愛前王門二句即所謂泛愛也泛愛字集中屢見何煩別解邀李尚書下馬詩湖上林風相與清上字的是月字之誤江南逢李龜年詩解者亦失其意咸謂感舊耳不知與此曲祗應天上有人間能得幾回聞正相反龜年盛時供奉御前首承寵遇人欲一望見不可得及其流落依人自活人亦不復重之尋常見幾度聞又逢君皆調笑意也劉隨州贈米嘉榮詩是感舊意蓋借以自比公貧士素不喜此輩意各不同北夢瑣言載昭宗末琵琶工石潨號石司馬者早為令狐綯所賞亂後入蜀遊諸大家一日軍校數員會飲石以胡琴在座既非知音喧譁語笑殊不屬耳石乃撲檀槽詬曰某曽為宰相供奉今日與健兒彈不我聽何其苦哉可與此相證和江陵宋少府詩才士得神秀書齋聞爾為以不與宴故曰聞何不可解乃欲改同字也遣悶詩城日避烏檣趙注最得倚著如秦贅謂家貧不得不附他人過逢類楚狂謂人多趨而避之也二語至不堪勿草草讀過尤妙語在隱顯間非如苦搖求食尾常曝報恩腮比世亂局文場語極悲所謂詩書遂牆壁也末四句是靈均臨睨舊鄉意新樓成奉衛王詩二儀清濁還髙下三伏炎蒸定有無氣象不滅早朝大明宫諸作然使非下句二儀清濁不免迂濶秋日荆南詩伏枕因超忽扁舟任往來謂因舟輕超忽自如故伏枕不礙往來也九鑽巴噀火此火豈可九鑽未免誤用結舌防讒柄讒且有柄故不得不防防讒無他但結舌耳探腸有禍胎探腸猶云罄竭肝膽讒人工于蒙蔽最惡在此差池分組冕合沓起蒿萊不必伊周地皆登屈宋才即鄉里小兒狐白裘意伊周地不必伊周其人即屈宋才不可多得咄咄自語漢庭和異域晉史坼中台霸業尋常體宗臣忌諱災此四句似為李尚書之芳而發李使吐蕃和親被留二年霸業尋常體謂當時世以公主下降絶域遂為故事也著一霸字見雖為宗社不得已故定非王道所宜二句亦雙頂上文公後有哭李詩中台之災豈爾時已臥疾歟江漢詩片雲天共逺永夜月同孤逺客孤身傷無伴也意在起句中一氣直下折檻行自悼也兵戈擾攘中舉世重武輕文故文士落莫秦王學士時難羡不稱文皇者正在兵戈擾攘中學士之榮如此故可羡也朱雲自喻公以諫諍受譴故也婁公不語不失盛德我獨願學宋公而不蒙見容公受譴上表謝尚自稱直臣集中屢及之白馬將軍若雷電泛言耳與崔旰事何涉重題哭李尚書詩兒童相顧盡宇宙此生浮上句道憶少時也語正不盡為佳獨坐詩滄溟服衰謝服字難通作恨字是久客詩衰顔聊自哂小吏最相輕公雖老困然擅名已久名公貴人皆相愛重獨細人無知時以腐鼠相嚇耳故曰狐狸何足道移居公安詩傷弓鳥雀飢最是閲厯苦語交態遭輕薄所謂傷弓也送顧八分文學詩才盡傷形體病渴汚官位公蓋嘗因詩成疾此青蓮所以譏飯顆也幽人詩知名未足稱局促商山芝謂四皓雖名重後世較之真仙相去尚逺也與思量入道苦自哂同嬰孩意相類泊嶽陽城下詩留滯才難盡艱危氣益增圖南未可料變化有鵾鵬公于時老病侵尋矣猶能作如是語真百折不回者送魏少府之交廣詩窮途仗神道世亂輕土宜語近俚而真甚故自不厭錯揮鐡如意莫避珊瑚枝始兼逸邁興終慎賓主儀如病酒人勸客節飲直以身為戒也送表姪王砯詩敘事與史殊不合史固不足盡慿公亦得自傳聞未必皆實王圭魏徴昔為仇讐此語可證必無杯酒納交之事剪髮亦陶母舊事名門之後多有溢美附會此不足怪馮翊逃難砯能以所騎馬借公持刀執鞚徒步衛而脫之亦是傑士竟因此詩不朽千古結句我欲就丹砂跋涉覺身勞安能陷糞土有志乘鯨鼇或驂鸞騰天聊作鶴鳴皋老病之人作此壯語竒恣橫絶集中亦僅一見耳丹砂南海所産老身從而往求筋力必不能勝除是騎鯨驂鸞末三句只一意筆縱至此何常以鸞比王耶公食貧不無望其意氣而又重出諸口故中道便住舌存恥作窮途哭知非虛語也此言外微旨又所當知過南嶽詩才淑隨厮養名賢隱鍛爐淑字妙才人隨厮養殊不易須淑乃辦耳張耳責數陳餘可參看但名賢字須作名髙看乃稱下水遣懷詩云窮迫挫曩懷常如中風走又云庶與達者論吞聲混瑕垢公庶幾能自淑者下水遣懷詩孤舟亂春華暮齒依蒲柳蒲柳以比後生蹉跎陶唐人鞭撻日月久初讀殊不能解蓋因舜葬之地想及上古今此苦遭鞭撻之人昔日陶唐之人也畫象而不犯徒聞其語蹉跎日月遂至此耶語意甚痛遣遇詩舟子廢寢食飄風爭所操我行匪利涉謝爾從者勞自傷運蹇帶纍下人也窮途中斷不可少此念政是其得力處不獨減米散同舟可稱述而已宿鑿石浦詩回塘淡暮色日沒衆星嘒缺月殊未明青燈死分翳蓬窗晚泊慘景如畫窮途多俊異亂世少恩惠謂豪傑乘時大都猛鷙也即干戈未揖讓意言外咄唶過津口詩白魚困密網黃鳥喧嘉音物微限通塞惻隱仁者心通謂黃鳥塞謂白魚也公蓋有解網之思耳次空靈岸詩沄沄逆素浪落落展清眺幸有舟楫遲得盡所厯妙浪逆舟遲旅人悶事坐此得厯覽勝概反以為幸吾常行過佳山水每恨不獲少駐讀此手舞足蹈青春猶無私白日亦遍照愛戀之言毒瘴未足憂兵戈滿邊徼謂瘴鄉兵戈不到擇禍莫若輕也早發詩有求常百慮斯文亦吾病文士通患千古喟然以兹朋故多窮老馳驅併一得一失倘朋故漸稀則馳驅亦息矣側聞夜來寇幸喜囊中淨富不如貧亂離中真語也艱危作逺客干請傷直性閲厯既深鋒鍔盡斂自歎轉退乃是轉解薇蕨餓首陽覺太苦粟馬資厯聘覺太奢兩難適從公蓋云免死而已矣嘗欲揭此以告遊客次晚洲詩擺浪散帙妨危沙折花當花根固非插花記險又大無謂似言危沙之上花藂可愛折枝移入舟中代彼小景耳同是臆解庶為近理中原未解兵吾得終疏放老人善自寬者登白馬潭詩宿鳥行猶去花藂笑不來須溪注鳥則宿矣吾行猶去固未甚妥董遐周至欲改去為失亦未敢謂然詳詩意白馬潭似是遊宴之所公登此別有感慨日出墅船開日出非清晨似隂晦疑夜而忽復晚晴故鳥已宿而仍去也花藂笑不來亦必有因晚先回者人人傷白首公豈為後生輩所驚怪耶末忽及新知既不知所指頗難臆斷凡集中有難解者闕疑可也詩須首尾通徹洞然不疑字有誤者確知其來厯始可改耳北風詩雖舟行遇阻然南方苦熱待此氣蘇又揚帆詩追述語故一往豪快作者胸襟實爾若謂以此勝晚唐似非篤論前後苦寒行形容蹇縮備盡又若何詠懷詩髙賢迫形勢豈暇相扶持猶云窮途多俊異亂世少恩惠也多事時人心往往與承平大異實緣勢所驅迫公能推究至此不獨憐彼顛沛之人并不肯扶持者亦曲為體諒稱曰髙賢俊異此其見不同迂儒也疲苶茍懷䇿栖屑無所施先王實罪已愁痛正為兹其微意謂當世有良將無良牧我能為之惜不見用以上慰帝心夜看豐城氣回首蛟龍池傷識者難遇也齒髮已自料所謂歲月不我與語似不忍盡者次首濳魚不銜鈎走鹿無反顧皎皎幽曠心拳拳異平素因聖逺法壞灰冷至此致君堯舜當不復挂齒風濤上春沙十里浸江樹乘槎水國風景宛然多憂汚桃源處不成處拙計泥銅柱出不成出賢愚誠等差自合受馳騖謂命應如此也擁滯僮僕慵稽留篙師怒每暫泊市㕓奴輩登岸長年呶呶有言輒念此語如目擊客從詩紀事感懷不當如是耶大凡詩及時事貴在不盡使人得于言外若非公家徵斂四字分見篇中其本意不可尋也珠中有隱字欲辨不成書即以此語贊此詩可也發潭州詩岸花飛送客檣燕語留人舉物以見人亦魚藻之義也公自蜀初適楚即云入舟翻不樂故楚中詩多悲雙楓浦詩再讀始解楓雖已摧必有臥根在浦口故欲截為槎借之上天也自驚衰謝力不道棟梁才彼此適合相對慨然江邊地有主須溪解妙非倦遊無託者不知此言之悲酬郭判官受詩云自得隋珠覺夜明酬韋韶州見寄云新詩錦不如公于後輩極意推奬如此然韋郭詩實俱可誦回棹詩散才嬰薄俗有迹愧前賢前賢妙在無迹非深心尚友不能道此勞生繫一物為客費多年自是警語瓶罍易滿船挈家舟行念此語當發一笑哭韋大夫詩綺樓關樹頂飛旐泛堂前關謂關閉即綺閣塵生意樹頂形容樓髙耳何謂奠樓又以關作髙也泛字好樓上詩皇輿三極北身事五湖南壯志羇懷一時交集所謂人言愁我始欲愁也千秋節詩湘川新涕淚秦樹逺樓臺一逺字若不勝情字法最妙走索背秋毫猶言間不容髮也與弓矢向秋毫向背字下得警䇿蘇侍御渙其人非靜者容齋三筆言之此亦何害仲尼謂與其進也不與其退也本不須回互若云詩名紀異不與他等厥有微旨不識公何緣前知且白髮變黑豈有意可為耶況集中亦不止此如徐卿二子之類又作何解贈盧參謀詩客星空伴使寒水不成潮又流年疲蟋蟀體物幸鷦鷯皆工甚枉裴道州手札詩久客多枉友朋書素書一月凡一束虛名但蒙寒暄問泛愛不救溝壑辱乃知閻浮提更千百年人情世態亦復如是無異也撥棄潭州百斛酒蕪沒瀟岸千株菊使我晝立煩兒孫令我夜坐費燈燭怨之可謂至矣讀倚著如秦贅過逢類楚狂及後生血氣豪舉動見老醜等句只此長紙寒暄亦不易得何刺刺至此郭欽上書見大計劉毅答詔驚羣臣公志在嚴華夷之防盡諫諍之職不以窮故輟也末寄呈蘇侍御有鳥雀肥秋粟蛟龍蟄寒沙之句必蘇晤公時感憤髙談意相近耳窮途感憤君子時有之意止欲撑持世界有禆君國終不為一人私憤仲尼曰小人窮斯濫矣公結句勉蘇語至激切得毋窺其微乎然則容齋之論移于此詩乃可也風疾舟中伏枕詩軒轅休製律虞舜罷彈琴尚錯雄鳴管猶傷半死心語意竒特詳其微旨諺所謂好事不如無也詩瘦有年重以衰老據云興盡才無悶愁來遽不禁得非以此三十六韻故轉添岑岑乎述作異陳琳用事絶巧子璋髑髏血糢糊手提擲還崔大夫他人用以截瘧而公固三年瘧病則述作正不異陳琳也應過數粒食得近四知金謂較鷦鷯差過之耳彼四知金那得近傍彼蒼回幹人得知騄驥人得有句法較然夢弼注誤春草封歸恨封即閉意謂方留滯他鄉未作故園想耳却假蘇張舌髙誇周宋鐔此詩蓋呈親友者冀其為老人作曹丘也畏人千里井問俗九州針首句言到處兢兢次句言浪遊非止一方也葛洪四句真是風燭之虞對雪詩無人竭浮蟻有待至昏鴉當是待所思而不至也追酬髙蜀州人日詩髙在時公頗不滿之死後却追思流涕者公既篤於友朋不肯自居於薄又題中老病懷舊追酬此詩因寄王敬蓋晚景寥落屬望生者故借髙以引意意實不在髙也贈蕭使君詩終始任安義荒蕪孟母鄰聨翩匍匐禮意氣死生親張老存家事嵇康有故人蕭于嚴公沒後事其母甘脆之禮若已庭闈終其天年又經紀喪事撫存諸孤蕭真義士而嚴之得士亦可見矣公于吳侍御之謫官則曰余時忝諍臣丹陛實咫尺相看受狼狽至死難塞責于蕭則曰食恩慙鹵莽鏤骨抱酸辛皆若引為已責不勝其愧者實則吳當嚴搜間諜時重殺無辜以去就爭倍難于蕭公之不言知言亦無益也故曰朝廷非不知閉口休歎息至與嚴交情本與蕭不同而蒼茫土木身稽留伏枕晨等句但自言老病若欲為蕭所為而力不任者揚人之善不惜以已身形之此等肝膽若揭日月有以也蕭真義士惜不知其名鶴曰蕭使君嘗宰縣公有蕭明府實處覔桃栽詩然考彼題稱蕭八明府而此稱蕭二十使君明是兩人未許冒認清明詩逢迎少壯非吾道況乃今朝更祓除真自負語公是時老困且死矣猶倔強如此觀其意直以逢迎少壯為不祥此豈茍且隨人者無論句法之妙也窮視其所不為若無此骨草木同腐矣贈韋七贊善詩鄉里衣冠不乏賢四句賓主相當北走關山開雨雪南遊花栁塞雲煙北雖雨雪曰開南雖花栁曰塞懷抱可知洞庭春色悲公子蝦菜忘歸范蠡船韋爾時必將北還范蠡公自道也嶽麓山道林二寺行初讀此題殆不能解蓋嶽麓寺因山為名既稱山遂不再及寺也然何不除去山字白馬東北來空鞍貫雙箭觸目命句豈必白馬定用侯景故事近時主將戮中夜商於戰須溪解是改商為傷便是三家村孰師語入衡州詩于崔瓘遇難後大為稱屈曰久客幸脫免暮年慙激昻曰悠悠委薄俗鬱鬱回剛腸公無事權筆底憤悶正見剛腸激昻也又曰問罪審形勢凱歌懸否臧當時必以崔為激變公意欲陽於克賊後一為昭雪耳舟中苦熱呈陽中丞詩嗚呼殺賢良不叱白刃散吾非丈夫特沒齒埋氷炭恥以風疾辭胡然泊湘岸賊自殺刺史公無官守乃若深以不能定亂為恥者氷炭謂風疾寒熱也觀此言公非老病當此紛紛必有以自見矣偏禆表三上鹵莽同一貫必歸罪崔瓘為賊乞免者宗英李端公守職甚昭煥變通迫脅地謀畫焉得算此端公當指李勉觀迫脅語豈亦曽為賊上章乎勉傳略不載耳衡山縣文宣王廟詩耳聞讀書聲殺伐災髣佛謂兵革去此尚逺不知其詳也文事武備相為盛衰恐不知者謂重新學宫于喪亂時未免迂濶故再三申言儒未可棄此舉實中興大義也髙歌激宇􅨚凡百慎失墜直欲遍告舉世思深哉廟毁不修是為失墜非採詩備國史之謂白酒牛炙之説當是史因聶耒陽詩附會也牛炙本賈閬仙事詩中亦無明證禮過宰肥羊斟酌應是牛炙耳猶之不著鵔鸃冠便謂不冠皆是卜度之言不足信也嘗與客戲言負薪採梠之人得飽死為幸而後人力為辨誣乃青蓮實病死初無騎鯨捉月之説而好事者爭傳之即有識之士亦默無一言為辨何也將毋謂醉死尚足為豪非如飽死太俗耶不知口腹殺人均也酒肉相去幾何軒輊至此進雕賦表稱先君恕預先臣審言唐時乃有此體式耶今雖異代恐不得爾引雕以為類志在正色立朝自負若此然豈可使權貴見亦如漢絳灌有社稷勳而賈生䇿治安曰使與韓彭易地雖殘亡可也安得不為所短耶宋陳同甫亦然英主不易得齊即墨大夫直是千載一遇耳漆園自評其文曰參差俶詭公自評其詩曰沈鬱頓挫人知何如自知審也漆園止自評公直以告君更竒公所進天狗賦雕賦在三大禮賦之先皆引以自況使其見用風槩可想昔靖節自謂性剛才拙與物多忤公倣佛似之晦翁云隱士大都負性氣當知儒門自曽子以下毋論隱顯必有一副徑骨不如是何緣表見千萬世耶獨至顔子其徑骨無從而見之故仲尼稱其好學比其死也曰今也則無未聞好學者于時曽子現在大學傳自曽子仲尼尚未許其能好也易乾曰自強不息坤曰厚德載物剛蓋用以自克豈用克人哉則聖門所謂學可思矣三大禮賦公所最得意者然佳句時有之不成句者亦時有之封西嶽賦亦復猶人耳都不足傳也封西嶽賦序云比嵗鴻生巨儒誦古史引時義云國家土德與黃帝合主上本命與金天合而守闕者亦百數天子寢不報蓋謙如也則知貢諛之徒車載斗量而公竟有此賦與司馬長卿死後何異幸其以詩擅名故此賦不為人所指目耳雜述為張叔卿孔巢父二人而作並稱其才曰聰明深察博辨閎大然謂叔卿放蕩勉之以靜謂巢父執雌守常吾無所贈其後叔卿為廣州判官第八卷中有寄廣州判官張叔卿詩此外無考想遂碌碌老死牖下巢父孤立強藩竟為所戕害人固難料豈非公所謂由天乎有命乎秋述所稱子魏子極讚其無邪氣得正始竟不知何名字叔卿非公一詩一文千古誰知之者可謂厚幸矣説旱勸鄭公清理獄囚及勿役兩川侍丁之老者真仁人之言東西兩川説欲分諸羌部落各自統領不使羌王得專制其命此論最妙漢朝賈之䇿親王也尚曰衆建諸侯而小其國況蠻夷乎至於蠻夷畏漢法治之誠宜寬大勿輕擾之賦斂宜薄非寬富人寬富人乃以寬貧人也觀其處分井井談兵羌利弊亦甚悉豈得謂非良吏才乎昔人謂右軍具經世略惜為書法所掩唯公亦然今人但知其能詩耳華州試進士䇿問五首其二云軍書未絶王命急宣插羽先翥於騰鷹敝帷不供于埋馬又云積骨頗多無暇更入燕王之市謂華為孔道供應疲勞馬多倒死也第四問云近者鄭南訓練城下屯集瞻彼三千之徒有異什一而稅竊見明發教以戰鬬亭午放其庸保課乃菽麥以為尋常夫悅以使人是能用古伊歲則云暮實慮休止未卜及瓜之還交比翳桑之餓蓋當時之民一身充兵民兩役有司但驅之習兵非但不給兵食仍急責其租稅參以新安吏石壕吏諸篇生斯時者亦可憐甚矣公之拜拾遺其遭遇雖不及青蓮然從此逺到可期兩人皆一蹶不復振青蓮坐永王事誠難湔洗公論救房琯縱不切事情初無大過倘有推挽者儘可再騁康衢而終身偃蹇以死可惜也今集中止存謝公敕放三司推問狀而救琯之疏竟不載當是稱述太過詔書有崇黨比周等語頒示天下畏禍不敢存稿耳謝放推問狀中謂琯性失於簡酷嗜鼓琴董庭蘭今之琴工遊琯門下有日貧病之老依倚為非琯之愛惜人情一至于玷汚蓋引咎語也然猶稱其少自樹立晚為醇儒有大臣節即前疏可知矣祭琯文中序陳陶斜之敗云盜本乘敝誅終不滅豈尚為賢者諱耶又云州牧救喪一二而已自古所歎罕聞知已曩者書札望公再起今來禮數為態至此炎涼俗套萬古如斯雖可歎可恨實不足歎不足恨也然末云玄豈正色白亦不分培塿滿地崑崙無羣為之憤悶極矣琯雖非腐儒大約孔文舉張魏公之流名過其實者使得英主駕馭之捨短取長佐其不逮儘可卓然建豎照映千秋而顧令外崇虛譽內困中官用之失宜以至於敗可重惋也自古創業之君必多哲輔其功名赫然者半不能令終豈必皆全才哉祗因善用之故得自表見耳此公所謂偶生賢達不必際會也皇甫淑妃神道碑題稱唐故德儀贈淑妃皇甫氏按唐因隋制皇后下有貴妃淑妃德妃賢妃各一人為夫人正一品開元中玄宗以一后四妃本法帝嚳而后妃四星一為正后今既立正后復有四妃非法乃於皇后下立惠妃麗妃華妃三位以代三夫人為正一品下此即不稱妃此武惠妃所以禮秩一同皇后也今妃卒於開元二十三年惠妃尚在應用三妃之號而制曰宜登四妃之列式旌六行之美可册贈淑妃其後太真亦仍稱貴妃蓋復依舊制矣據碑文妃薨時年已四十二而文中云上以服事最舊佳人難得送藥必經於御手見寢始回於天步亦可謂寵幸不衰者考其時武惠妃正承恩寵年亦四十又未幾亦卒而太真始進遂至專寵其後六宫無復進御即江妃不得分宫中一席地矣然則妃之死於二十三年非不幸之幸乎萬年縣君京兆杜氏墓志公感其活已私諡義姑遂與王砯皆因一事垂名千載據志中云公昔臥病姑家姑子又病女巫言處楹之東南隅者吉姑遂易子之地以安公公活而姑之子卒嗚呼此真人情所難也非公此文後世誰知者事有類此者悉採集之附正史後可耳杜詩攟卷四
